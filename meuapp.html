<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAI SLIM</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card-bg: #1a1a1a; --text: #fff; --danger: #ff4444; --success: #00c851; --blue: #33b5e5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow: hidden; }

        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; padding: 10px; box-sizing: border-box; }
        .active { display: flex; }

        .header-mini { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .logo-box { background: var(--primary); color:#000; padding: 5px 10px; border-radius: 8px; font-weight: 900; font-size: 14px; }

        .card { 
            background: var(--card-bg); padding: 12px; border-radius: 15px; 
            text-align: center; border: 1px solid #333; width: 100%; box-sizing: border-box;
        }

        .badge { padding: 3px 10px; border-radius: 50px; font-size: 10px; font-weight: bold; }
        .online-glow { background: rgba(0, 200, 81, 0.1); color: var(--success); border: 1px solid var(--success); }
        .offline-glow { background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .btn { 
            width: 100%; padding: 12px; border: none; border-radius: 10px; 
            font-weight: bold; font-size: 14px; margin-top: 8px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-main { background: var(--primary); color: #000; }
        .btn-stop { background: var(--danger); color: #fff; }
        .btn-nav { background: var(--blue); color: #fff; }
        
        input { 
            width: 100%; padding: 10px; margin: 5px 0; 
            background: #222; border: 1px solid #444; border-radius: 8px; color: white;
        }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0; }
        .info-box { background: #222; padding: 8px; border-radius: 10px; text-align: left; border-left: 3px solid var(--primary); }
        .info-label { font-size: 9px; color: #888; text-transform: uppercase; }
        .info-val { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .price-slim { font-size: 20px; color: var(--success); font-weight: 900; margin: 5px 0; }
    </style>
</head>
<body>

    <div id="m-login" class="screen active" style="justify-content: center;">
        <div class="card">
            <div class="logo-box" style="display:inline-block; margin-bottom:10px;">PINDAVAI</div>
            <input type="email" id="l-email" placeholder="E-mail">
            <input type="password" id="l-senha" placeholder="Senha">
            <button class="btn btn-main" onclick="fazerLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="m-status" class="screen">
        <div class="header-mini">
            <div class="logo-box">PINDAVAI</div>
            <div id="badge-status" class="badge offline-glow">Offline</div>
        </div>
        
        <div class="card" style="margin-top: 5px;">
            <h3 id="nome-m" style="margin: 5px 0;">Adriano</h3>
            <p style="color:#777; font-size: 12px; margin-bottom: 15px;">Sistema de Monitoramento Ativo</p>
            <button id="btn-toggle" class="btn btn-main" onclick="toggleOnline()">
                <i class="fas fa-power-off"></i> FICAR ONLINE
            </button>
            <button onclick="logout()" style="background:none; border:none; color:#444; margin-top:15px; font-size:11px;">Sair da Conta</button>
        </div>
    </div>

    <div id="m-corrida" class="screen">
        <div class="header-mini">
            <div class="logo-box">EM CURSO</div>
            <div id="fase-titulo" style="font-size: 11px; font-weight: bold; color: var(--primary);">BUSCANDO...</div>
        </div>
        
        <div class="card">
            <div class="info-grid">
                <div class="info-box" style="grid-column: span 2;">
                    <div class="info-label">Passageiro</div>
                    <div class="info-val" id="pass-nome">---</div>
                </div>
                <div class="info-box">
                    <div class="info-label">Destino</div>
                    <div class="info-val" id="dest-val">---</div>
                </div>
                <div class="info-box" style="border-left-color: var(--success);">
                    <div class="info-label">Valor</div>
                    <div class="info-val" style="color:var(--success)">R$ <span id="val-txt">0.00</span></div>
                </div>
            </div>

            <button id="btn-gps-busca" class="btn btn-nav" onclick="abrirNavegador('origem')">
                <i class="fas fa-location-arrow"></i> MAPA DE BUSCA
            </button>
            <button id="btn-gps-destino" class="btn btn-nav" style="display:none;" onclick="abrirNavegador('destino')">
                <i class="fas fa-map"></i> MAPA DESTINO
            </button>

            <button id="btn-acao-corrida" class="btn btn-main" onclick="proximaFase()">
                CONFIRMAR EMBARQUE
            </button>
            
            <div id="area-finalizar" style="display:none;">
                <div class="price-slim">R$ <span id="val-total">0.00</span></div>
                <button class="btn btn-main" onclick="finalizarCorrida()">
                    <i class="fas fa-check"></i> FINALIZAR CORRIDA
                </button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let motorista, idCorrida, isOnline = false;
    let dadosCorrida = { origem: "", destino: "", valor: "" };

    window.onload = () => {
        const e = localStorage.getItem('pindavai_email');
        const s = localStorage.getItem('pindavai_senha');
        if(e && s) autoLogin(e, s);
    };

    function autoLogin(email, senha) {
        const chave = email.replace(/\./g, '_');
        db.ref('usuarios_motoristas/' + chave).once('value', snap => {
            const d = snap.val();
            if(d && d.senha === senha) {
                motorista = d; motorista.chave = chave;
                document.getElementById('nome-m').innerText = d.nome;
                verificarSeHaCorridaAtiva();
            } else { mostrarTela('m-login'); }
        });
    }

    function verificarSeHaCorridaAtiva() {
        db.ref('corridas_abertas').once('value', snap => {
            let ativa = false;
            snap.forEach(item => {
                const c = item.val();
                if(c.idMotorista === motorista.chave && c.status !== "Finalizada") {
                    idCorrida = item.key; montarTelaCorrida(c); ativa = true;
                }
            });
            if(!ativa && !isOnline) mostrarTela('m-status');
        });
    }

    function toggleOnline() {
        isOnline = !isOnline;
        const btn = document.getElementById('btn-toggle');
        const badge = document.getElementById('badge-status');
        if(isOnline) {
            btn.innerHTML = '<i class="fas fa-stop-circle"></i> FICAR OFFLINE';
            btn.className = "btn btn-stop";
            badge.innerText = "Online"; badge.className = "badge online-glow";
            db.ref('corridas_abertas').on('value', snap => {
                if(!isOnline || idCorrida) return;
                snap.forEach(item => {
                    const c = item.val();
                    if(c.status === "Aguardando") {
                        if(confirm("NOVA CORRIDA!\nOrigem: " + c.origem)) aceitar(item.key, c);
                    }
                });
            });
        } else {
            btn.innerHTML = '<i class="fas fa-power-off"></i> FICAR ONLINE';
            btn.className = "btn btn-main";
            badge.innerText = "Offline"; badge.className = "badge offline-glow";
            db.ref('corridas_abertas').off();
        }
    }

    function aceitar(id, dados) {
        idCorrida = id;
        db.ref('corridas_abertas/' + id).update({
            status: "Aceita", idMotorista: motorista.chave, nomeMotorista: motorista.nome
        }).then(() => {
            montarTelaCorrida(dados);
            abrirNavegador('origem');
        });
    }

    function montarTelaCorrida(dados) {
        dadosCorrida = dados;
        document.getElementById('val-total').innerText = dados.valor;
        document.getElementById('val-txt').innerText = dados.valor;
        document.getElementById('pass-nome').innerText = dados.cliente;
        document.getElementById('dest-val').innerText = dados.destino;
        
        if(dados.status === "Em Viagem") {
            atualizarUIEmViagem();
        } else {
            document.getElementById('fase-titulo').innerText = "BUSCANDO PASSAGEIRO";
            document.getElementById('btn-gps-busca').style.display = "flex";
            document.getElementById('btn-gps-destino').style.display = "none";
            document.getElementById('btn-acao-corrida').style.display = "flex";
            document.getElementById('area-finalizar').style.display = "none";
        }
        mostrarTela('m-corrida');
    }

    function proximaFase() {
        db.ref('corridas_abertas/' + idCorrida).update({ status: "Em Viagem" }).then(() => {
            atualizarUIEmViagem();
            setTimeout(() => { abrirNavegador('destino'); }, 300);
        });
    }

    function atualizarUIEmViagem() {
        document.getElementById('fase-titulo').innerText = "EM VIAGEM";
        document.getElementById('fase-titulo').style.color = "var(--blue)";
        document.getElementById('btn-gps-busca').style.display = "none";
        document.getElementById('btn-gps-destino').style.display = "flex";
        document.getElementById('btn-acao-corrida').style.display = "none";
        document.getElementById('area-finalizar').style.display = "block";
    }

    function abrirNavegador(tipo) {
        const local = (tipo === 'origem') ? dadosCorrida.origem : dadosCorrida.destino;
        if(local) window.location.href = "google.navigation:q=" + encodeURIComponent(local);
    }

    function finalizarCorrida() {
        if(confirm("Finalizar?")) {
            db.ref('corridas_abertas/' + idCorrida).update({ status: "Finalizada" }).then(() => {
                idCorrida = null; mostrarTela('m-status');
            });
        }
    }

    function fazerLogin() {
        const e = document.getElementById('l-email').value;
        const s = document.getElementById('l-senha').value;
        localStorage.setItem('pindavai_email', e);
        localStorage.setItem('pindavai_senha', s);
        autoLogin(e, s);
    }

    function logout() { localStorage.clear(); location.reload(); }
    function mostrarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
