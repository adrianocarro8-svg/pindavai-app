<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAI ULTRA SLIM</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ffcc00; --bg: #000; --card-bg: #141414; --text: #fff; --blue: #00a8ff; --success: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow: hidden; }
        
        .screen { display: none; height: 100vh; flex-direction: column; padding: 8px; box-sizing: border-box; }
        .active { display: flex; }

        /* Cabeçalho Minúsculo */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 12px; }
        .logo { background: var(--primary); color: #000; padding: 2px 8px; border-radius: 4px; font-weight: 900; }

        .card { background: var(--card-bg); padding: 10px; border-radius: 12px; border: 1px solid #222; width: 100%; box-sizing: border-box; }

        /* Botões Compactos para caber na tela */
        .btn { 
            width: 100%; padding: 12px; border: none; border-radius: 8px; 
            font-weight: bold; font-size: 14px; margin-top: 6px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            text-transform: uppercase;
        }
        .btn-main { background: var(--primary); color: #000; }
        .btn-nav { background: var(--blue); color: #fff; }
        .btn-danger { background: #e74c3c; color: #fff; font-size: 11px; padding: 8px; }

        /* Grid de Informação Super Compacto */
        .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 6px; margin-bottom: 8px; }
        .box { background: #1f1f1f; padding: 6px 10px; border-radius: 8px; border-left: 3px solid var(--primary); }
        .label { font-size: 9px; color: #888; text-transform: uppercase; display: block; }
        .val { font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        input { width: 100%; padding: 10px; margin-bottom: 8px; background: #111; border: 1px solid #333; color: #fff; border-radius: 6px; }
    </style>
</head>
<body>

    <div id="m-login" class="screen active" style="justify-content: center;">
        <div class="card" style="text-align: center;">
            <div class="logo" style="display:inline-block; margin-bottom:15px;">PINDAVAI</div>
            <input type="email" id="l-email" placeholder="E-mail">
            <input type="password" id="l-senha" placeholder="Senha">
            <button class="btn btn-main" onclick="fazerLogin()">ACESSAR PAINEL</button>
        </div>
    </div>

    <div id="m-status" class="screen">
        <div class="top-bar">
            <div class="logo">PINDAVAI</div>
            <div id="st-label" style="color:#e74c3c">● OFFLINE</div>
        </div>
        <div class="card" style="text-align: center;">
            <h4 id="nome-m" style="margin: 5px 0;">Adriano</h4>
            <button id="btn-toggle" class="btn btn-main" onclick="toggleOnline()">FICAR ONLINE</button>
            <button class="btn btn-danger" onclick="logout()" style="margin-top: 15px; opacity: 0.5;">SAIR DA CONTA</button>
        </div>
    </div>

    <div id="m-corrida" class="screen">
        <div class="top-bar">
            <div id="fase-txt" style="color: var(--primary); font-weight: 900;">BUSCANDO PASSAGEIRO</div>
            <div id="val-topo" style="color: var(--success); font-weight: bold;">R$ 0.00</div>
        </div>

        <div class="card">
            <div class="box" style="margin-bottom: 6px; border-left-color: #fff;">
                <span class="label">Passageiro</span>
                <div class="val" id="pass-nome">---</div>
            </div>
            
            <div class="grid">
                <div class="box"><span class="label">Destino</span><div class="val" id="dest-val">---</div></div>
                <div class="box" style="border-left-color: var(--success);"><span class="label">Valor</span><div class="val" id="val-txt">R$ 0.00</div></div>
            </div>

            <button id="btn-gps-busca" class="btn btn-nav" onclick="abrirNavegador('origem')">
                <i class="fas fa-location-arrow"></i> MAPA DE BUSCA
            </button>
            <button id="btn-gps-destino" class="btn btn-nav" style="display:none;" onclick="abrirNavegador('destino')">
                <i class="fas fa-map"></i> MAPA DESTINO
            </button>

            <button id="btn-acao" class="btn btn-main" onclick="proximaFase()">
                CONFIRMAR EMBARQUE
            </button>
            
            <button id="btn-finalizar" class="btn btn-main" style="display:none; background: var(--success);" onclick="finalizarCorrida()">
                FINALIZAR E RECEBER
            </button>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let motorista, idCorrida, isOnline = false;
    let dadosCorrida = { origem: "", destino: "", valor: "" };

    window.onload = () => {
        const e = localStorage.getItem('pindavai_email');
        const s = localStorage.getItem('pindavai_senha');
        if(e && s) autoLogin(e, s);
    };

    function autoLogin(email, senha) {
        const chave = email.replace(/\./g, '_');
        db.ref('usuarios_motoristas/' + chave).once('value', snap => {
            const d = snap.val();
            if(d && d.senha === senha) {
                motorista = d; motorista.chave = chave;
                document.getElementById('nome-m').innerText = d.nome.split(' ')[0]; // Só o primeiro nome para caber
                verificarSeHaCorridaAtiva();
            } else { mostrarTela('m-login'); }
        });
    }

    function verificarSeHaCorridaAtiva() {
        db.ref('corridas_abertas').once('value', snap => {
            let ativa = false;
            snap.forEach(item => {
                const c = item.val();
                if(c.idMotorista === motorista.chave && c.status !== "Finalizada") {
                    idCorrida = item.key; montarTelaCorrida(c); ativa = true;
                }
            });
            if(!ativa && !isOnline) mostrarTela('m-status');
        });
    }

    function toggleOnline() {
        isOnline = !isOnline;
        const btn = document.getElementById('btn-toggle');
        const lbl = document.getElementById('st-label');
        if(isOnline) {
            btn.innerText = "FICAR OFFLINE"; btn.style.background = "#e74c3c"; btn.style.color = "#fff";
            lbl.innerText = "● ONLINE"; lbl.style.color = "#2ecc71";
            db.ref('corridas_abertas').on('value', snap => {
                if(!isOnline || idCorrida) return;
                snap.forEach(item => {
                    const c = item.val();
                    if(c.status === "Aguardando") {
                        if(confirm("NOVA CORRIDA!\nOrigem: " + c.origem)) aceitar(item.key, c);
                    }
                });
            });
        } else {
            btn.innerText = "FICAR ONLINE"; btn.style.background = "var(--primary)"; btn.style.color = "#000";
            lbl.innerText = "● OFFLINE"; lbl.style.color = "#e74c3c";
            db.ref('corridas_abertas').off();
        }
    }

    function aceitar(id, dados) {
        idCorrida = id;
        db.ref('corridas_abertas/' + id).update({ status: "Aceita", idMotorista: motorista.chave, nomeMotorista: motorista.nome })
        .then(() => { montarTelaCorrida(dados); abrirNavegador('origem'); });
    }

    function montarTelaCorrida(dados) {
        dadosCorrida = dados;
        document.getElementById('val-topo').innerText = "R$ " + dados.valor;
        document.getElementById('val-txt').innerText = "R$ " + dados.valor;
        document.getElementById('pass-nome').innerText = dados.cliente;
        document.getElementById('dest-val').innerText = dados.destino;
        
        if(dados.status === "Em Viagem") {
            atualizarUIViagem();
        } else {
            document.getElementById('fase-txt').innerText = "BUSCANDO PASSAGEIRO";
            document.getElementById('btn-gps-busca').style.display = "flex";
            document.getElementById('btn-gps-destino').style.display = "none";
            document.getElementById('btn-acao').style.display = "flex";
            document.getElementById('btn-finalizar').style.display = "none";
        }
        mostrarTela('m-corrida');
    }

    function proximaFase() {
        db.ref('corridas_abertas/' + idCorrida).update({ status: "Em Viagem" }).then(() => {
            atualizarUIViagem();
            setTimeout(() => { abrirNavegador('destino'); }, 300);
        });
    }

    function atualizarUIViagem() {
        document.getElementById('fase-txt').innerText = "EM VIAGEM";
        document.getElementById('fase-txt').style.color = "var(--blue)";
        document.getElementById('btn-gps-busca').style.display = "none";
        document.getElementById('btn-gps-destino').style.display = "flex";
        document.getElementById('btn-acao').style.display = "none";
        document.getElementById('btn-finalizar').style.display = "flex";
    }

    function abrirNavegador(tipo) {
        const local = (tipo === 'origem') ? dadosCorrida.origem : dadosCorrida.destino;
        if(local) window.location.href = "google.navigation:q=" + encodeURIComponent(local);
    }

    function finalizarCorrida() {
        if(confirm("Finalizar corrida?")) {
            db.ref('corridas_abertas/' + idCorrida).update({ status: "Finalizada" }).then(() => {
                idCorrida = null; mostrarTela('m-status');
            });
        }
    }

    function fazerLogin() {
        const e = document.getElementById('l-email').value;
        const s = document.getElementById('l-senha').value;
        localStorage.setItem('pindavai_email', e);
        localStorage.setItem('pindavai_senha', s);
        autoLogin(e, s);
    }

    function logout() { localStorage.clear(); location.reload(); }
    function mostrarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
