<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAÍ MOTORISTA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ffcc00; --dark: #1a1a1a; --danger: #dc3545; --blue: #4285F4; --success: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; text-align:center; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; }
        .active { display: flex; }
        .card { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box;}
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; }
        .btn-yellow { background: var(--primary); color: var(--dark); }
        .btn-red { background: var(--danger); color: white; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #map { width: 100%; height: 250px; border-radius: 15px; margin-bottom: 10px; background: #eee; }
        .star-rating { font-size: 40px; color: #ddd; cursor: pointer; margin: 20px 0; }
        .star-rating i.active { color: var(--primary); }
    </style>
</head>
<body>
    <audio id="audioNotificacao" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" loop preload="auto"></audio>

    <div id="m-login" class="screen active">
        <div class="card">
            <h1>PINDAVAÍ</h1>
            <input type="email" id="l-email" placeholder="E-mail">
            <input type="password" id="l-senha" placeholder="Senha">
            <button class="btn btn-yellow" onclick="fazerLogin()">ENTRAR</button>
            <button class="btn" style="background:none; color:var(--blue); font-size:14px;" onclick="mostrarTela('m-cadastro')">Não tem conta? Cadastre-se</button>
        </div>
    </div>

    <div id="m-cadastro" class="screen">
        <div class="card">
            <h2>Cadastro Motorista</h2>
            <div style="max-height: 350px; overflow-y: auto;">
                <input type="text" id="c-nome" placeholder="Nome Completo">
                <input type="email" id="c-email" placeholder="E-mail">
                <input type="tel" id="c-tel" placeholder="Telefone/WhatsApp">
                <input type="text" id="c-cpf" placeholder="CPF">
                <input type="text" id="c-veiculo" placeholder="Veículo (Ex: Onix Prata)">
                <input type="text" id="c-placa" placeholder="Placa">
                <input type="password" id="c-senha" placeholder="Senha">
            </div>
            <button class="btn btn-yellow" onclick="fazerCadastro()">CADASTRAR</button>
            <button class="btn" style="background:none; color:var(--blue); font-size:14px;" onclick="mostrarTela('m-login')">Voltar</button>
        </div>
    </div>

    <div id="m-status" class="screen">
        <div class="card">
            <h3 id="nome-exibicao">---</h3>
            <div id="status-text" style="color:orange; font-weight:bold; margin-bottom:20px;">OFFLINE</div>
            <button id="btn-toggle" class="btn btn-yellow" onclick="toggleOnline()">FICAR ONLINE</button>
            <button onclick="sairDefinitivamente()" style="margin-top:20px; color:red; border:none; background:none;">SAIR</button>
        </div>
    </div>

    <div id="m-chamada" class="screen" style="background: rgba(0,0,0,0.9);">
        <div class="card">
            <h2>🔔 NOVA VIAGEM!</h2>
            <div id="detalhes-chamada" style="text-align: left; margin: 15px 0; font-size: 14px;"></div>
            <button class="btn btn-yellow" onclick="aceitarCorrida()">ACEITAR</button>
            <button class="btn" style="background: #eee;" onclick="recusarCorrida()">RECUSAR</button>
        </div>
    </div>

    <div id="m-viagem" class="screen">
        <div class="card">
            <div id="map"></div>
            <h3 id="titulo-viagem" style="margin: 5px 0;">A CAMINHO</h3>
            <p id="destino-texto" style="font-size: 13px; color: #666; margin-bottom: 10px;"></p>
            <button class="btn btn-yellow" id="btn-proximo" onclick="proximaEtapa()">EMBARQUEI PASSAGEIRO</button>
            <button class="btn btn-red" id="btn-finalizar" style="display:none;" onclick="finalizarCorrida()">FINALIZAR CORRIDA</button>
        </div>
    </div>

    <div id="m-avaliacao-p" class="screen">
        <div class="card">
            <h2>Avalie o Passageiro</h2>
            <p id="nome-passageiro-aval"></p>
            <div class="star-rating" id="stars-p">
                <i class="fas fa-star" onclick="setRatingP(1)"></i>
                <i class="fas fa-star" onclick="setRatingP(2)"></i>
                <i class="fas fa-star" onclick="setRatingP(3)"></i>
                <i class="fas fa-star" onclick="setRatingP(4)"></i>
                <i class="fas fa-star" onclick="setRatingP(5)"></i>
            </div>
            <button class="btn btn-yellow" onclick="enviarAvaliacaoPassageiro()">ENVIAR</button>
        </div>
    </div>

    <script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCjP9yWZK4AUkJmswfb5iZVTLENDfTmP8o",
        authDomain: "meuappmobilidade-a6f93.firebaseapp.com",
        databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com",
        projectId: "meuappmobilidade-a6f93",
        storageBucket: "meuappmobilidade-a6f93.firebasestorage.app",
        messagingSenderId: "1001774053416",
        appId: "1:1001774053416:web:dcda8aee94322da8559d1d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let motoristaId, dadosMotorista, isOnline = false, idCorridaAtiva = null;
    let map, markerMotorista, routeLayer, myLat, myLon;
    let notaPassageiro = 0, nomePassageiroAtual = "";

    function initMap() {
        if (map) return;
        map = L.map('map', {zoomControl: false}).setView([0,0], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        markerMotorista = L.marker([0,0]).addTo(map);
    }

    function mostrarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'm-viagem') {
            setTimeout(() => { 
                initMap();
                map.invalidateSize(); 
            }, 300);
        }
    }

    // --- CADASTRO E LOGIN ---
    function fazerCadastro() {
        const dados = {
            nome: document.getElementById('c-nome').value,
            email: document.getElementById('c-email').value,
            telefone: document.getElementById('c-tel').value,
            cpf: document.getElementById('c-cpf').value,
            veiculo: document.getElementById('c-veiculo').value,
            placa: document.getElementById('c-placa').value,
            senha: document.getElementById('c-senha').value
        };
        if(Object.values(dados).some(v => !v)) return alert("Preencha tudo!");
        db.ref('motoristas').push(dados).then(() => { alert("Sucesso!"); mostrarTela('m-login'); });
    }

    function fazerLogin() {
        const email = document.getElementById('l-email').value;
        const senha = document.getElementById('l-senha').value;
        db.ref('motoristas').orderByChild('email').equalTo(email).once('value', snap => {
            if(snap.exists()){
                const id = Object.keys(snap.val())[0];
                const user = snap.val()[id];
                if(user.senha === senha) {
                    motoristaId = id; dadosMotorista = user;
                    document.getElementById('nome-exibicao').innerText = "Olá, " + user.nome;
                    iniciarRastreamento();
                    mostrarTela('m-status');
                } else alert("Senha errada");
            } else alert("Não encontrado");
        });
    }

    function toggleOnline() {
        isOnline = !isOnline;
        const statusTxt = document.getElementById('status-text');
        statusTxt.innerText = isOnline ? "ONLINE" : "OFFLINE";
        statusTxt.style.color = isOnline ? "green" : "orange";
        document.getElementById('btn-toggle').innerText = isOnline ? "FICAR OFFLINE" : "FICAR ONLINE";
        if(isOnline) ouvirCorridas();
    }

    function ouvirCorridas() {
        db.ref('corridas_pendentes').on('child_added', snap => {
            const c = snap.val();
            if(isOnline && !idCorridaAtiva && c.status === "pendente") {
                idCorridaAtiva = snap.key;
                nomePassageiroAtual = c.nome;
                document.getElementById('detalhes-chamada').innerHTML = `<b>${c.nome}</b><br>De: ${c.partida}<br>Para: ${c.destino}<br><b>Valor: ${c.valor}</b>`;
                document.getElementById('audioNotificacao').play();
                mostrarTela('m-chamada');
            }
        });
    }

    // --- FUNÇÃO PARA DESENHAR A ROTA ---
    async function desenharRota(enderecoDestino) {
        if(routeLayer) map.removeLayer(routeLayer);
        const apiKeyGeo = "60cdf3de97e8477a8d0936582f4cd072";
        try {
            // Geocodificar o destino
            const geoRes = await fetch(`https://api.geoapify.com/v1/geocode/search?text=${encodeURIComponent(enderecoDestino + " Pindamonhangaba")}&apiKey=${apiKeyGeo}`).then(r => r.json());
            if(!geoRes.features.length) return;
            const destCoords = geoRes.features[0].geometry.coordinates;
            
            // Buscar rota entre motorista (myLat, myLon) e o destino
            const routeUrl = `https://api.geoapify.com/v1/routing?waypoints=${myLat},${myLon}|${destCoords[1]},${destCoords[0]}&mode=drive&apiKey=${apiKeyGeo}`;
            const routeRes = await fetch(routeUrl).then(r => r.json());
            
            if(routeRes.features) {
                routeLayer = L.geoJSON(routeRes.features[0], {
                    style: { color: '#4285F4', weight: 5 }
                }).addTo(map);
                map.fitBounds(routeLayer.getBounds(), {padding: [20, 20]});
            }
        } catch(e) { console.error("Erro na rota", e); }
    }

    function aceitarCorrida() {
        db.ref('corridas_pendentes/'+idCorridaAtiva).once('value', snap => {
            const c = snap.val();
            db.ref('corridas_pendentes/'+idCorridaAtiva).update({ 
                status: "A caminho", 
                motoristaId: motoristaId, motoristaNome: dadosMotorista.nome, motoristaPlaca: dadosMotorista.placa 
            });
            document.getElementById('audioNotificacao').pause();
            document.getElementById('destino-texto').innerText = "Buscando em: " + c.partida;
            mostrarTela('m-viagem');
            desenharRota(c.partida); // Rota até o passageiro
        });
    }

    function proximaEtapa() {
        db.ref('corridas_pendentes/'+idCorridaAtiva).once('value', snap => {
            const c = snap.val();
            document.getElementById('destino-texto').innerText = "Destino: " + c.destino;
            document.getElementById('titulo-viagem').innerText = "EM VIAGEM";
            document.getElementById('btn-proximo').style.display = "none";
            document.getElementById('btn-finalizar').style.display = "flex";
            db.ref('corridas_pendentes/'+idCorridaAtiva).update({ status: "Em Viagem" });
            desenharRota(c.destino); // Rota até o destino final
        });
    }

    function finalizarCorrida() {
        db.ref('corridas_pendentes/'+idCorridaAtiva).update({ status: "Finalizada" }).then(() => {
            document.getElementById('nome-passageiro-aval').innerText = nomePassageiroAtual;
            mostrarTela('m-avaliacao-p');
        });
    }

    // --- AVALIAÇÃO E RASTREAMENTO ---
    function setRatingP(n) {
        notaPassageiro = n;
        document.querySelectorAll('#stars-p i').forEach((s, i) => s.classList.toggle('active', i < n));
    }

    function enviarAvaliacaoPassageiro() {
        if(!notaPassageiro) return alert("Avalie!");
        db.ref('avaliacoes_passageiros').push({ motoristaId, passageiroNome: nomePassageiroAtual, nota: notaPassageiro, timestamp: Date.now() });
        idCorridaAtiva = null; 
        if(routeLayer) map.removeLayer(routeLayer);
        document.getElementById('btn-proximo').style.display = "flex";
        document.getElementById('btn-finalizar').style.display = "none";
        document.getElementById('titulo-viagem').innerText = "A CAMINHO";
        mostrarTela('m-status');
    }

    function iniciarRastreamento() {
        navigator.geolocation.watchPosition(pos => {
            myLat = pos.coords.latitude;
            myLon = pos.coords.longitude;
            if(markerMotorista) markerMotorista.setLatLng([myLat, myLon]);
            if(map && idCorridaAtiva) map.panTo([myLat, myLon]);

            if(motoristaId) {
                let st = isOnline ? (idCorridaAtiva ? "ocupado" : "disponivel") : "offline";
                db.ref('localizacao_motoristas/'+motoristaId).set({
                    nome: dadosMotorista.nome, lat: myLat, lon: myLon, status: st, timestamp: Date.now()
                });
            }
        }, null, { enableHighAccuracy: true });
    }

    function sairDefinitivamente() {
        if(motoristaId) db.ref('localizacao_motoristas/'+motoristaId).remove().then(() => location.reload());
    }

    function recusarCorrida() {
        idCorridaAtiva = null;
        document.getElementById('audioNotificacao').pause();
        mostrarTela('m-status');
    }
    </script>
</body>
</html>
