<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINDAVAI - Motorista V6.5 (GPS)</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #ffcc00; --dark: #1a1a1a; --success: #28a745; --danger: #dc3545; --blue: #007bff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; }
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        .btn-yellow { background: var(--primary); color: var(--dark); }
        .btn-red { background: var(--danger); color: white; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-outline { background: none; border: 1px solid #ccc; color: #666; font-size: 13px; border:none; cursor:pointer; }
        .ganho-box { background: #e7f9ed; color: var(--success); padding: 12px; border-radius: 12px; margin: 10px 0; border: 1px solid #c3e6cb; }
        .ganho-valor { font-size: 28px; font-weight: bold; display: block; }
        .pay-badge { display: inline-block; padding: 5px 10px; border-radius: 5px; background: #eee; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="m-login" class="screen active">
        <div class="card">
            <h2>PINDAVAI</h2>
            <p>Painel Motorista</p>
            <input type="email" id="l-email" placeholder="E-mail">
            <input type="password" id="l-senha" placeholder="Senha">
            <button class="btn btn-yellow" onclick="fazerLogin()">ENTRAR</button>
            <button class="btn btn-outline" onclick="mostrarTela('m-registro')">Criar conta</button>
        </div>
    </div>

    <div id="m-registro" class="screen">
        <div class="card">
            <h3>Novo Cadastro</h3>
            <input type="text" id="r-nome" placeholder="Nome">
            <input type="email" id="r-email" placeholder="E-mail">
            <input type="text" id="r-veiculo" placeholder="Carro/Placa">
            <input type="password" id="r-senha" placeholder="Senha">
            <button class="btn btn-yellow" onclick="cadastrarMotorista()">ENVIAR</button>
            <button class="btn btn-outline" onclick="mostrarTela('m-login')">Voltar</button>
        </div>
    </div>

    <div id="m-status" class="screen">
        <div class="card">
            <h3 id="nome-m">Olá!</h3>
            <p id="txt-status">Status: Offline</p>
            <button id="btn-toggle" class="btn btn-yellow" onclick="toggleOnline()">FICAR ONLINE</button>
            <button class="btn btn-outline" onclick="location.reload()" style="margin-top:20px;">Sair</button>
        </div>
    </div>

    <div id="m-corrida" class="screen">
        <div class="card">
            <h4>VIAGEM EM CURSO</h4>
            
            <div id="info-viagem" style="text-align:left; font-size:14px; margin-bottom:10px;"></div>
            
            <div id="metodo-pagamento" class="pay-badge">---</div>

            <button class="btn btn-blue" onclick="abrirNavegador()">🛰️ ABRIR NO GPS (MAPS)</button>

            <div class="ganho-box">
                <small>VALOR TOTAL:</small>
                <span class="ganho-valor">R$ <span id="val-total">0.00</span></span>
            </div>
            
            <button class="btn btn-yellow" onclick="finalizarCorrida()">RECEBIDO / FINALIZAR</button>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const somAlerta = new Audio('https://actions.google.com/google_assistant/ambience/industrial/bell_01.mp3');
    let motorista, idCorrida, isOnline = false, watchID = null, destinoAtual = "";

    function mostrarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function fazerLogin() {
        const chave = document.getElementById('l-email').value.replace(/\./g, '_');
        db.ref('usuarios_motoristas/' + chave).once('value', snap => {
            const d = snap.val();
            if(d && d.senha === document.getElementById('l-senha').value) {
                motorista = d; motorista.chave = chave;
                document.getElementById('nome-m').innerText = d.nome;
                mostrarTela('m-status');
            } else alert("Erro no login!");
        });
    }

    function cadastrarMotorista() {
        const chave = document.getElementById('r-email').value.replace(/\./g, '_');
        db.ref('usuarios_motoristas/' + chave).set({
            nome: document.getElementById('r-nome').value,
            veiculo: document.getElementById('r-veiculo').value,
            senha: document.getElementById('r-senha').value,
            status: "Pendente", isOnline: false
        }).then(() => { alert("Aguarde aprovação!"); mostrarTela('m-login'); });
    }

    function toggleOnline() {
        db.ref('usuarios_motoristas/' + motorista.chave).once('value', snap => {
            if(snap.val().status !== "Ativo") return alert("Conta pendente de aprovação.");
            isOnline = !isOnline;
            const btn = document.getElementById('btn-toggle');
            if(isOnline) {
                somAlerta.play().then(() => somAlerta.pause());
                btn.innerText = "FICAR OFFLINE"; btn.className = "btn btn-red";
                document.getElementById('txt-status').innerText = "Status: Online e Buscando...";
                
                watchID = navigator.geolocation.watchPosition(pos => {
                    db.ref('usuarios_motoristas/' + motorista.chave).update({
                        lat: pos.coords.latitude, lng: pos.coords.longitude, isOnline: true
                    });
                }, null, {enableHighAccuracy: true});

                db.ref('corridas_abertas').on('value', snap => {
                    if(!isOnline) return;
                    snap.forEach(item => {
                        const c = item.val();
                        if(c.status === "Aguardando" && !idCorrida) {
                            somAlerta.play();
                            if(confirm(`NOVA CORRIDA!\nOrigem: ${c.origem}\nDestino: ${c.destino}\nValor: R$ ${c.valor}\nPagamento: ${c.pagamento}`)) {
                                somAlerta.pause();
                                aceitar(item.key, c);
                            } else { somAlerta.pause(); }
                        }
                    });
                });
            } else {
                btn.innerText = "FICAR ONLINE"; btn.className = "btn btn-yellow";
                db.ref('usuarios_motoristas/' + motorista.chave).update({ isOnline: false });
                db.ref('corridas_abertas').off();
                navigator.geolocation.clearWatch(watchID);
            }
        });
    }

    function aceitar(id, dados) {
        idCorrida = id;
        destinoAtual = dados.destino; // Guarda o destino para o botão do GPS
        db.ref('corridas_abertas/' + id).update({
            status: "Aceita", idMotorista: motorista.chave, nomeMotorista: motorista.nome
        }).then(() => {
            document.getElementById('val-total').innerText = dados.valor;
            document.getElementById('metodo-pagamento').innerText = "PAGAMENTO: " + dados.pagamento;
            document.getElementById('info-viagem').innerHTML = `<b>Passageiro:</b> ${dados.cliente}<br><b>Destino:</b> ${dados.destino}`;
            mostrarTela('m-corrida');
        });
    }

    function abrirNavegador() {
        if(!destinoAtual) return;
        // Gera a URL do Google Maps limpando caracteres especiais
        const url = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(destinoAtual);
        window.open(url, '_blank');
    }

    function finalizarCorrida() {
        if(confirm("Confirma o recebimento do pagamento e fim da viagem?")) {
            db.ref('corridas_abertas/' + idCorrida).update({ status: "Finalizada" }).then(() => {
                idCorrida = null;
                destinoAtual = "";
                mostrarTela('m-status');
            });
        }
    }
</script>
</body>
</html>
