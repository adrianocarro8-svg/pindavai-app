<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAÍ MOTORISTA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ffcc00; --dark: #1a1a1a; --danger: #dc3545; --blue: #4285F4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; }
        .btn-yellow { background: var(--primary); color: var(--dark); }
        .btn-blue { background: var(--blue); color: #fff; }
        input { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .badge-pag { background: #e8f5e9; color: #2e7d32; padding: 5px 10px; border-radius: 5px; font-weight: bold; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
    <audio id="audioNotificacao" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" loop preload="auto"></audio>

    <div id="m-login" class="screen active">
        <div class="card">
            <h1>PINDAVAÍ</h1>
            <input type="email" id="l-email" placeholder="E-mail">
            <input type="password" id="l-senha" placeholder="Senha">
            <button class="btn btn-yellow" onclick="fazerLogin()">ENTRAR</button>
            <button onclick="mostrarTela('m-cadastro')" style="background:none; border:none; color:blue; margin-top:15px; cursor:pointer;">Quero me cadastrar</button>
        </div>
    </div>

    <div id="m-cadastro" class="screen">
        <div class="card">
            <h3>Cadastro Motorista</h3>
            <input type="text" id="c-nome" placeholder="Nome Completo">
            <input type="email" id="c-email" placeholder="E-mail">
            <input type="text" id="c-veiculo" placeholder="Veículo e Placa">
            <input type="password" id="c-senha" placeholder="Crie uma Senha">
            <button class="btn btn-yellow" onclick="acaoCadastroMotorista()">CADASTRAR</button>
            <button onclick="mostrarTela('m-login')" style="background:none; border:none; margin-top:15px;">Voltar</button>
        </div>
    </div>

    <div id="m-status" class="screen">
        <div class="card">
            <h3 id="nome-exibicao">---</h3>
            <div id="status-text" style="color:orange; font-weight:bold;">OFFLINE (AMARELO)</div>
            <button id="btn-toggle" class="btn btn-yellow" onclick="toggleOnline()">FICAR ONLINE</button>
        </div>
    </div>

    <div id="m-chamada" class="screen" style="background: rgba(0,0,0,0.9);">
        <div class="card">
            <h2>🔔 NOVA VIAGEM!</h2>
            <div id="detalhes-chamada" style="text-align: left; margin: 20px 0; line-height: 1.6;"></div>
            <button class="btn btn-yellow" onclick="aceitarCorrida()">ACEITAR</button>
            <button class="btn" style="background: #eee;" onclick="recusarCorrida()">RECUSAR</button>
        </div>
    </div>

    <div id="m-viagem" class="screen">
        <div class="card">
            <h2 id="titulo-viagem">INDO BUSCAR</h2>
            <div id="pagamento-fixo" class="badge-pag"></div><br><br>
            <button class="btn btn-blue" onclick="abrirGPS()">ABRIR GPS</button>
            <button id="btn-proximo" class="btn btn-yellow" onclick="proximaEtapa()">JÁ RECOLHI O PASSAGEIRO</button>
            <button id="btn-finalizar" class="btn" style="display:none; background:red; color:white;" onclick="finalizarCorrida()">FINALIZAR</button>
        </div>
    </div>

    <script>
    const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let motoristaId, dadosMotorista, isOnline = false, idCorridaAtiva = null, etapaViagem = "buscar", destinoAtual = "";

    function fazerLogin() {
        const email = document.getElementById('l-email').value;
        const senha = document.getElementById('l-senha').value;
        db.ref('motoristas').orderByChild('email').equalTo(email).once('value', snap => {
            if(snap.exists()){
                const id = Object.keys(snap.val())[0];
                if(snap.val()[id].senha === senha) {
                    motoristaId = id; dadosMotorista = snap.val()[id];
                    document.getElementById('nome-exibicao').innerText = dadosMotorista.nome;
                    verificarRecuperacaoDeCorrida();
                    iniciarRastreamento();
                } else alert("Senha incorreta");
            }
        });
    }

    function verificarRecuperacaoDeCorrida() {
        db.ref('corridas_pendentes').on('value', snap => {
            snap.forEach(c => {
                const dados = c.val();
                if(dados.motoristaId === motoristaId && (dados.status === "A caminho" || dados.status === "Em Viagem")) {
                    idCorridaAtiva = c.key;
                    destinoAtual = (dados.status === "Em Viagem") ? dados.destino : dados.partida;
                    document.getElementById('pagamento-fixo').innerText = "Pagamento: " + dados.pagamento;
                    if(dados.status === "Em Viagem") { 
                        document.getElementById('btn-proximo').style.display = "none";
                        document.getElementById('btn-finalizar').style.display = "block";
                    }
                    mostrarTela('m-viagem');
                }
                if(idCorridaAtiva && c.key === idCorridaAtiva && dados.status === "Cancelada") {
                    alert("Passageiro cancelou!");
                    location.reload();
                }
            });
        });
    }

    function ouvirCorridas() {
        db.ref('corridas_pendentes').on('child_added', snap => {
            const c = snap.val();
            if(isOnline && !idCorridaAtiva && c.status === "pendente") {
                idCorridaAtiva = snap.key;
                destinoAtual = c.partida;
                document.getElementById('detalhes-chamada').innerHTML = `
                    <b>Origem:</b> ${c.partida}<br>
                    <b>Destino:</b> ${c.destino}<br>
                    <b>Pagamento:</b> <span style="color:green">${c.pagamento}</span>
                `;
                document.getElementById('audioNotificacao').play();
                mostrarTela('m-chamada');
            }
        });
    }

    function aceitarCorrida() {
        db.ref('corridas_pendentes/' + idCorridaAtiva).update({ 
            status: "A caminho", motoristaId: motoristaId, 
            motoristaNome: dadosMotorista.nome, motoristaPlaca: dadosMotorista.veiculo 
        });
        document.getElementById('audioNotificacao').pause();
        mostrarTela('m-viagem');
    }

    function proximaEtapa() {
        db.ref('corridas_pendentes/' + idCorridaAtiva).update({ status: "Em Viagem" });
        location.reload();
    }

    function finalizarCorrida() {
        db.ref('corridas_pendentes/' + idCorridaAtiva).update({ status: "Finalizada" }).then(() => location.reload());
    }

    function abrirGPS() { window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(destinoAtual)}`); }

    function toggleOnline() {
        isOnline = !isOnline;
        document.getElementById('status-text').innerText = isOnline ? "ONLINE (VERDE)" : "OFFLINE (AMARELO)";
        document.getElementById('status-text').style.color = isOnline ? "green" : "orange";
        if(isOnline) ouvirCorridas();
    }

    function iniciarRastreamento() {
        navigator.geolocation.watchPosition(pos => {
            if(!motoristaId) return;
            db.ref('localizacao_motoristas/' + motoristaId).set({
                nome: dadosMotorista.nome, lat: pos.coords.latitude, lng: pos.coords.longitude,
                status: isOnline ? (idCorridaAtiva ? "a_caminho" : "disponivel") : "logado"
            });
        }, null, { enableHighAccuracy: true });
    }

    function acaoCadastroMotorista() {
        const d = {
            nome: document.getElementById('c-nome').value,
            email: document.getElementById('c-email').value,
            veiculo: document.getElementById('c-veiculo').value,
            senha: document.getElementById('c-senha').value,
            status: "ativo"
        };
        db.ref('motoristas').push(d).then(() => { alert("OK!"); mostrarTela('m-login'); });
    }

    function mostrarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    </script>
</body>
</html>
