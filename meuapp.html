<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINDAVAI - Motorista V9.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #ffcc00; --dark: #1a1a1a; --success: #28a745; --danger: #dc3545; --blue: #007bff; --orange: #fd7e14; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; }
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 15px; transition: 0.3s; }
        .btn-yellow { background: var(--primary); color: var(--dark); }
        .btn-red { background: var(--danger); color: white; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-orange { background: var(--orange); color: white; }
        .btn-outline { background: none; border: 1px solid #ccc; color: #666; font-size: 13px; border:none; cursor:pointer; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .pay-badge { display: inline-block; padding: 5px 10px; border-radius: 5px; background: #eee; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="m-login" class="screen active">
        <div class="card">
            <h2>PINDAVAI</h2>
            <p>Painel Motorista</p>
            <input type="email" id="l-email" placeholder="E-mail">
            <input type="password" id="l-senha" placeholder="Senha">
            <button class="btn btn-yellow" onclick="fazerLogin()">ENTRAR</button>
            <button class="btn btn-outline" onclick="mostrarTela('m-registro')">Criar conta</button>
        </div>
    </div>

    <div id="m-registro" class="screen">
        <div class="card">
            <h3>Novo Cadastro</h3>
            <input type="text" id="r-nome" placeholder="Nome">
            <input type="email" id="r-email" placeholder="E-mail">
            <input type="text" id="r-veiculo" placeholder="Carro/Placa">
            <input type="password" id="r-senha" placeholder="Senha">
            <button class="btn btn-yellow" onclick="cadastrarMotorista()">ENVIAR</button>
            <button class="btn btn-outline" onclick="mostrarTela('m-login')">Voltar</button>
        </div>
    </div>

    <div id="m-status" class="screen">
        <div class="card">
            <h3 id="nome-m">Olá!</h3>
            <p id="txt-status">Status: Offline</p>
            <button id="btn-toggle" class="btn btn-yellow" onclick="toggleOnline()">FICAR ONLINE</button>
            <button class="btn btn-outline" onclick="logout()" style="margin-top:20px;">Sair / Trocar Conta</button>
        </div>
    </div>

    <div id="m-corrida" class="screen">
        <div class="card">
            <h4 id="fase-titulo" style="color: var(--orange);">INDO BUSCAR PASSAGEIRO</h4>
            <div id="info-viagem" style="text-align:left; font-size:14px; margin-bottom:10px;"></div>
            <div id="metodo-pagamento" class="pay-badge">---</div>
            
            <button id="btn-gps-busca" class="btn btn-orange" onclick="abrirNavegador('origem')">🛰️ ABRIR GPS (BUSCAR)</button>
            <button id="btn-gps-destino" class="btn btn-blue" style="display:none;" onclick="abrirNavegador('destino')">🛰️ ABRIR GPS (DESTINO)</button>

            <hr style="margin:15px 0; border:0; border-top:1px solid #eee;">
            <button id="btn-acao-corrida" class="btn btn-yellow" onclick="proximaFase()">PASSAGEIRO EMBARCOU</button>
            
            <div id="area-finalizar" style="display:none; background:#e7f9ed; padding:10px; border-radius:10px; margin-top:10px;">
                <small>VALOR A COBRAR:</small><br>
                <b style="font-size:22px; color:#28a745;">R$ <span id="val-total">0.00</span></b>
                <button class="btn btn-yellow" onclick="finalizarCorrida()">RECEBIDO / FINALIZAR</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const somAlerta = new Audio('https://raw.githubusercontent.com/rafael-pinto/sons/master/alarme.mp3');
    somAlerta.loop = true;

    let motorista, idCorrida, isOnline = false, watchID = null;
    let dadosCorrida = { origem: "", destino: "", valor: "" };

    // --- SISTEMA DE PERSISTÊNCIA (RECUPERAR LOGIN E CORRIDA) ---
    window.onload = () => {
        const salvo = localStorage.getItem('motorista_pindavai');
        if(salvo) {
            motorista = JSON.parse(salvo);
            document.getElementById('nome-m').innerText = motorista.nome;
            
            // Verifica se havia uma corrida salva
            const corridaSalva = localStorage.getItem('id_corrida_ativa');
            if(corridaSalva) {
                recuperarCorrida(corridaSalva);
            } else {
                mostrarTela('m-status');
            }
        }
    };

    function mostrarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function fazerLogin() {
        const email = document.getElementById('l-email').value;
        const senha = document.getElementById('l-senha').value;
        const chave = email.replace(/\./g, '_');

        db.ref('usuarios_motoristas/' + chave).once('value', snap => {
            const d = snap.val();
            if(d && d.senha === senha) {
                motorista = d; motorista.chave = chave;
                localStorage.setItem('motorista_pindavai', JSON.stringify(motorista));
                document.getElementById('nome-m').innerText = d.nome;
                mostrarTela('m-status');
            } else alert("Dados incorretos!");
        });
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    function toggleOnline() {
        isOnline = !isOnline;
        const btn = document.getElementById('btn-toggle');
        if(isOnline) {
            somAlerta.play().then(() => somAlerta.pause()).catch(e => {});
            btn.innerText = "FICAR OFFLINE"; btn.className = "btn btn-red";
            
            watchID = navigator.geolocation.watchPosition(pos => {
                db.ref('usuarios_motoristas/' + motorista.chave).update({
                    lat: pos.coords.latitude, lng: pos.coords.longitude, isOnline: true
                });
            }, null, {enableHighAccuracy: true});

            db.ref('corridas_abertas').on('value', snap => {
                if(!isOnline || idCorrida) return;
                snap.forEach(item => {
                    const c = item.val();
                    if(c.status === "Aguardando") {
                        somAlerta.play();
                        if(confirm(`NOVA CORRIDA!\n\nOrigem: ${c.origem}\nDestino: ${c.destino}`)) {
                            somAlerta.pause();
                            aceitar(item.key, c);
                        } else { somAlerta.pause(); }
                    }
                });
            });
        } else {
            btn.innerText = "FICAR ONLINE"; btn.className = "btn btn-yellow";
            db.ref('usuarios_motoristas/' + motorista.chave).update({ isOnline: false });
            db.ref('corridas_abertas').off();
            if(watchID) navigator.geolocation.clearWatch(watchID);
        }
    }

    function aceitar(id, dados) {
        idCorrida = id;
        localStorage.setItem('id_corrida_ativa', id); // Salva a corrida no celular
        db.ref('corridas_abertas/' + id).update({
            status: "Aceita", idMotorista: motorista.chave, nomeMotorista: motorista.nome
        }).then(() => montarTelaCorrida(dados));
    }

    function recuperarCorrida(id) {
        db.ref('corridas_abertas/' + id).once('value', snap => {
            const d = snap.val();
            if(d && d.status !== "Finalizada") {
                idCorrida = id;
                montarTelaCorrida(d);
            } else {
                localStorage.removeItem('id_corrida_ativa');
                mostrarTela('m-status');
            }
        });
    }

    function montarTelaCorrida(dados) {
        dadosCorrida = dados;
        document.getElementById('val-total').innerText = dados.valor;
        document.getElementById('metodo-pagamento').innerText = "Pagamento: " + dados.pagamento;
        document.getElementById('info-viagem').innerHTML = `<b>Passageiro:</b> ${dados.cliente}<br><b>Origem:</b> ${dados.origem}<br><b>Destino:</b> ${dados.destino}`;
        
        // Se já estava em viagem, mantém o estado
        if(dados.status === "Em Viagem") {
            proximaFase(true);
        } else {
            document.getElementById('fase-titulo').innerText = "INDO BUSCAR PASSAGEIRO";
            document.getElementById('btn-gps-busca').style.display = "block";
            document.getElementById('btn-gps-destino').style.display = "none";
            document.getElementById('btn-acao-corrida').style.display = "block";
            document.getElementById('area-finalizar').style.display = "none";
        }
        mostrarTela('m-corrida');
    }

    function proximaFase(recuperando = false) {
        if(!recuperando) {
            db.ref('corridas_abertas/' + idCorrida).update({ status: "Em Viagem" });
        }
        document.getElementById('fase-titulo').innerText = "EM VIAGEM COM PASSAGEIRO";
        document.getElementById('fase-titulo').style.color = "var(--blue)";
        document.getElementById('btn-gps-busca').style.display = "none";
        document.getElementById('btn-gps-destino').style.display = "block";
        document.getElementById('btn-acao-corrida').style.display = "none";
        document.getElementById('area-finalizar').style.display = "block";
    }

    function abrirNavegador(tipo) {
        const local = (tipo === 'origem') ? dadosCorrida.origem : dadosCorrida.destino;
        // Abre o Maps em nova aba para não fechar o app
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(local)}`, '_blank');
    }

    function finalizarCorrida() {
        if(confirm("Finalizar viagem?")) {
            db.ref('corridas_abertas/' + idCorrida).update({ status: "Finalizada" }).then(() => {
                localStorage.removeItem('id_corrida_ativa');
                idCorrida = null;
                mostrarTela('m-status');
            });
        }
    }
</script>
</body>
</html>
