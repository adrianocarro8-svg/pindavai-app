<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAÍ MOTORISTA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ffcc00; --dark: #1a1a1a; --success: #28a745; --danger: #dc3545; --blue: #4285F4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; color: #333; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-yellow { background: var(--primary); color: #000; }
        .btn-red { background: var(--danger); color: #fff; }
        .btn-blue { background: var(--blue); color: #fff; }
        .destaque { color: var(--blue); font-weight: bold; font-size: 16px; display: block; margin: 10px 0; background: #eef4ff; padding: 10px; border-radius: 8px; border: 1px dashed var(--blue); }
        input { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <audio id="audioNotificacao" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" loop preload="auto"></audio>

    <div id="m-login" class="screen active">
        <div class="card">
            <h1 style="margin-bottom:5px;">PINDAVAÍ</h1>
            <p style="color:#666; margin-bottom:15px;">Acesso Motorista</p>
            <input type="email" id="l-email" placeholder="E-mail">
            <input type="password" id="l-senha" placeholder="Senha">
            <button class="btn btn-yellow" onclick="fazerLogin()">ENTRAR</button>
            <p onclick="mostrarTela('m-cadastro')" style="cursor:pointer; color:blue; margin-top:20px;">Quero ser motorista</p>
        </div>
    </div>

    <div id="m-cadastro" class="screen">
        <div class="card">
            <h3>Cadastro de Motorista</h3>
            <input type="text" id="c-nome" placeholder="Nome Completo">
            <input type="text" id="c-tel" placeholder="Telefone / WhatsApp">
            <input type="text" id="c-cpf" placeholder="CPF">
            <input type="text" id="c-modelo" placeholder="Modelo do Carro">
            <input type="text" id="c-placa" placeholder="Placa do Veículo">
            <input type="email" id="c-email" placeholder="E-mail">
            <input type="password" id="c-senha" placeholder="Crie uma Senha">
            <button class="btn btn-yellow" onclick="acaoCadastroMotorista()">FINALIZAR CADASTRO</button>
            <p onclick="mostrarTela('m-login')" style="cursor:pointer; margin-top:15px;">Voltar</p>
        </div>
    </div>

    <div id="m-status" class="screen">
        <div class="card">
            <h3 id="nome-exibicao">---</h3>
            <div id="status-text" style="margin-bottom:15px; font-weight:bold; color:red;">VOCÊ ESTÁ OFFLINE</div>
            <button id="btn-toggle" class="btn btn-yellow" onclick="toggleOnline()">FICAR ONLINE</button>
        </div>
    </div>

    <div id="m-chamada" class="screen" style="background: rgba(0,0,0,0.95);">
        <div class="card">
            <h2 style="color: #ff6600">🔔 NOVA VIAGEM!</h2>
            <div id="detalhes-chamada" style="text-align: left; margin: 20px 0; line-height: 1.6;"></div>
            <button class="btn btn-yellow" onclick="aceitarCorrida()">ACEITAR CORRIDA</button>
            <button class="btn" style="background: #eee;" onclick="recusarCorrida()">RECUSAR</button>
        </div>
    </div>

    <div id="m-viagem" class="screen">
        <div class="card">
            <h2 id="titulo-viagem" style="color:var(--blue)">INDO BUSCAR</h2>
            <p style="font-size: 11px; color: #888; margin:0">ENDEREÇO ATUAL:</p>
            <span id="info-viagem" class="destaque">---</span>
            
            <button class="btn btn-blue" onclick="abrirGPS()">
                <i class="fas fa-map-marked-alt"></i> ABRIR NO MAPS
            </button>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <button id="btn-proximo" class="btn btn-yellow" onclick="proximaEtapa()">JÁ RECOLHI O PASSAGEIRO</button>
            <button id="btn-finalizar" class="btn btn-red" style="display:none;" onclick="finalizarCorrida()">FINALIZAR CORRIDA</button>
        </div>
    </div>

    <script>
    const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let dadosMotorista = null;
    let motoristaId = null;
    let watchID = null;
    let isOnline = false, idCorridaAtiva = null, dadosCorridaAtual = null, etapaViagem = "buscar";
    const somAlerta = document.getElementById('audioNotificacao');

    async function acaoCadastroMotorista() {
        const nome = document.getElementById('c-nome').value;
        const telefone = document.getElementById('c-tel').value;
        const cpf = document.getElementById('c-cpf').value;
        const modelo = document.getElementById('c-modelo').value;
        const placa = document.getElementById('c-placa').value;
        const email = document.getElementById('c-email').value;
        const senha = document.getElementById('c-senha').value;
        if(!nome || !telefone || !email) return alert("Preencha os dados obrigatórios!");
        await db.ref('motoristas').push({ nome, telefone, cpf, modelo, placa, email, senha, status: "ativo", nota: 5.0 });
        alert("Cadastro realizado!"); mostrarTela('m-login');
    }

    function fazerLogin() {
        const email = document.getElementById('l-email').value;
        const senha = document.getElementById('l-senha').value;
        db.ref('motoristas').orderByChild('email').equalTo(email).once('value', snap => {
            if(snap.exists()){
                motoristaId = Object.keys(snap.val())[0];
                const user = snap.val()[motoristaId];
                if(user.senha === senha) {
                    dadosMotorista = user;
                    document.getElementById('nome-exibicao').innerText = "Olá, " + user.nome;
                    // VERIFICA SE JÁ TINHA CORRIDA ANTES DE IR PRO STATUS
                    verificarCorridaAtiva();
                } else alert("Senha incorreta");
            } else alert("Motorista não encontrado");
        });
    }

    // --- NOVA FUNÇÃO: RECUPERAR ESTADO DA CORRIDA ---
    function verificarCorridaAtiva() {
        db.ref('corridas_pendentes').once('value', snap => {
            const corridas = snap.val();
            let encontrou = false;
            
            for(let id in corridas) {
                const c = corridas[id];
                // Verifica se eu sou o motorista e a corrida não terminou
                if(c.motoristaId === motoristaId && c.status !== "Finalizada" && c.status !== "Cancelada") {
                    idCorridaAtiva = id;
                    dadosCorridaAtual = c;
                    isOnline = true; 
                    encontrou = true;

                    if(c.status === "A caminho") {
                        etapaViagem = "buscar";
                        document.getElementById('titulo-viagem').innerText = "INDO BUSCAR PASSAGEIRO";
                        document.getElementById('info-viagem').innerText = c.partida;
                        document.getElementById('btn-proximo').style.display = "flex";
                        document.getElementById('btn-finalizar').style.display = "none";
                    } else if(c.status === "Em Viagem") {
                        etapaViagem = "levar";
                        document.getElementById('titulo-viagem').innerText = "LEVANDO AO DESTINO";
                        document.getElementById('info-viagem').innerText = c.destino;
                        document.getElementById('btn-proximo').style.display = "none";
                        document.getElementById('btn-finalizar').style.display = "flex";
                    }
                    
                    iniciarRastreamento();
                    mostrarTela('m-viagem');
                    break;
                }
            }
            if(!encontrou) mostrarTela('m-status');
        });
    }

    function atualizarLocalizacaoNoBanco(lat, lng) {
        if(!motoristaId || !isOnline) return;
        let statusMapa = idCorridaAtiva ? "ocupado" : "disponivel";
        db.ref('localizacao_motoristas/' + motoristaId).set({
            nome: dadosMotorista.nome,
            placa: dadosMotorista.placa,
            lat: lat,
            lng: lng,
            status: statusMapa
        });
    }

    function iniciarRastreamento() {
        if ("geolocation" in navigator) {
            watchID = navigator.geolocation.watchPosition(position => {
                atualizarLocalizacaoNoBanco(position.coords.latitude, position.coords.longitude);
            }, error => console.log(error), { enableHighAccuracy: true });
        }
    }

    function pararRastreamento() {
        if (watchID) navigator.geolocation.clearWatch(watchID);
        if (motoristaId) db.ref('localizacao_motoristas/' + motoristaId).remove();
    }

    function toggleOnline() {
        isOnline = !isOnline;
        const btn = document.getElementById('btn-toggle');
        const statusTxt = document.getElementById('status-text');
        if(isOnline) {
            btn.innerText = "FICAR OFFLINE"; btn.className = "btn btn-red";
            statusTxt.innerText = "VOCÊ ESTÁ ONLINE - AGUARDANDO CORRIDAS";
            statusTxt.style.color = "green";
            iniciarRastreamento();
            ouvirCorridas();
        } else {
            btn.innerText = "FICAR ONLINE"; btn.className = "btn btn-yellow";
            statusTxt.innerText = "VOCÊ ESTÁ OFFLINE";
            statusTxt.style.color = "red";
            pararRastreamento();
            db.ref('corridas_pendentes').off();
        }
    }

    function ouvirCorridas() {
        db.ref('corridas_pendentes').on('value', snap => {
            if(!isOnline || idCorridaAtiva) return;
            const corridas = snap.val();
            for(let id in corridas) {
                if(corridas[id].status === "pendente") {
                    idCorridaAtiva = id;
                    dadosCorridaAtual = corridas[id];
                    exibirChamada(corridas[id]);
                    break;
                }
            }
        });
    }

    function exibirChamada(dados) {
        somAlerta.play();
        document.getElementById('detalhes-chamada').innerHTML = `
            <b>PASSAGEIRO:</b> ${dados.passageiroNome}<br>
            <b>PARTIDA:</b> ${dados.partida}<br>
            <b>DESTINO:</b> ${dados.destino}<br>
            <h3 style="margin-top:10px; color:green;">${dados.valor}</h3>
        `;
        mostrarTela('m-chamada');
    }

    function aceitarCorrida() {
        somAlerta.pause();
        etapaViagem = "buscar";
        document.getElementById('titulo-viagem').innerText = "INDO BUSCAR PASSAGEIRO";
        document.getElementById('info-viagem').innerText = dadosCorridaAtual.partida;
        document.getElementById('btn-proximo').style.display = "flex";
        document.getElementById('btn-finalizar').style.display = "none";
        
        db.ref('corridas_pendentes/' + idCorridaAtiva).update({ 
            status: "A caminho", 
            motoristaId: motoristaId,
            motoristaNome: dadosMotorista.nome,
            motoristaPlaca: dadosMotorista.placa 
        });
        mostrarTela('m-viagem');
    }

    function proximaEtapa() {
        etapaViagem = "levar";
        document.getElementById('titulo-viagem').innerText = "LEVANDO AO DESTINO";
        document.getElementById('info-viagem').innerText = dadosCorridaAtual.destino;
        document.getElementById('btn-proximo').style.display = "none";
        document.getElementById('btn-finalizar').style.display = "flex";
        db.ref('corridas_pendentes/' + idCorridaAtiva).update({ status: "Em Viagem" });
    }

    function abrirGPS() {
        let local = (etapaViagem === "buscar") ? dadosCorridaAtual.partida : dadosCorridaAtual.destino;
        window.open("https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(local), "_blank");
    }

    function finalizarCorrida() {
        db.ref('corridas_pendentes/' + idCorridaAtiva).update({ status: "Finalizada" }).then(() => {
            alert("Viagem Finalizada!");
            idCorridaAtiva = null;
            mostrarTela('m-status');
        });
    }

    function recusarCorrida() { somAlerta.pause(); idCorridaAtiva = null; mostrarTela('m-status'); }
    
    function mostrarTela(id) { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
    }
    </script>
</body>
</html>
