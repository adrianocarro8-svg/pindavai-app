<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAI - Motorista V11.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #ffcc00; --dark: #1a1a1a; --success: #28a745; --danger: #dc3545; --blue: #007bff; --orange: #fd7e14; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; overscroll-behavior: none; }
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 15px; transition: 0.3s; }
        .btn-yellow { background: var(--primary); color: var(--dark); }
        .btn-red { background: var(--danger); color: white; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-orange { background: var(--orange); color: white; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .status-badge { font-weight: bold; padding: 5px 15px; border-radius: 20px; margin-bottom: 15px; display: inline-block; }
        .status-off { background: #ffebee; color: var(--danger); }
        .status-on { background: #e8f5e9; color: var(--success); }
    </style>
</head>
<body>

    <div id="m-login" class="screen active">
        <div class="card">
            <h2>PINDAVAI</h2>
            <p>Painel Motorista</p>
            <input type="email" id="l-email" placeholder="E-mail">
            <input type="password" id="l-senha" placeholder="Senha">
            <button class="btn btn-yellow" onclick="fazerLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="m-status" class="screen">
        <div class="card">
            <h2 id="nome-m" style="margin-bottom: 5px;">Adriano</h2>
            <div id="badge-status" class="status-badge status-off">Status: Offline</div>
            
            <button id="btn-toggle" class="btn btn-yellow" onclick="toggleOnline()">FICAR ONLINE</button>
            <button class="btn btn-outline" onclick="logout()" style="margin-top:30px; border:none; background:none; color:#999; cursor:pointer;">Sair da Conta</button>
        </div>
    </div>

    <div id="m-corrida" class="screen">
        <div class="card">
            <h4 id="fase-titulo" style="color: var(--orange); margin-top:0;">BUSCANDO PASSAGEIRO</h4>
            <div id="info-viagem" style="text-align:left; font-size:14px; margin-bottom:10px; background:#f9f9f9; padding:10px; border-radius:10px;"></div>
            
            <button id="btn-gps-busca" class="btn btn-orange" onclick="abrirNavegador('origem')">🛰️ ABRIR GPS (MAPS)</button>
            <button id="btn-gps-destino" class="btn btn-blue" style="display:none;" onclick="abrirNavegador('destino')">🛰️ ABRIR GPS (MAPS)</button>

            <hr style="margin:15px 0; border:0; border-top:1px solid #eee;">
            <button id="btn-acao-corrida" class="btn btn-yellow" onclick="proximaFase()">PASSAGEIRO EMBARCOU</button>
            
            <div id="area-finalizar" style="display:none; background:#e7f9ed; padding:15px; border-radius:10px; margin-top:10px;">
                <small>VALOR A RECEBER:</small><br>
                <b style="font-size:24px; color:#28a745;">R$ <span id="val-total">0.00</span></b>
                <button class="btn btn-yellow" onclick="finalizarCorrida()">RECEBIDO / FINALIZAR</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let motorista, idCorrida, isOnline = false;
    let dadosCorrida = { origem: "", destino: "", valor: "" };

    window.onload = () => {
        const emailSalvo = localStorage.getItem('pindavai_email');
        const senhaSalva = localStorage.getItem('pindavai_senha');
        if(emailSalvo && senhaSalva) autoLogin(emailSalvo, senhaSalva);
    };

    function autoLogin(email, senha) {
        const chave = email.replace(/\./g, '_');
        db.ref('usuarios_motoristas/' + chave).once('value', snap => {
            const d = snap.val();
            if(d && d.senha === senha) {
                motorista = d; motorista.chave = chave;
                document.getElementById('nome-m').innerText = d.nome;
                verificarSeHaCorridaAtiva();
            } else { mostrarTela('m-login'); }
        });
    }

    function verificarSeHaCorridaAtiva() {
        db.ref('corridas_abertas').once('value', snap => {
            let encontrou = false;
            snap.forEach(item => {
                const c = item.val();
                if(c.idMotorista === motorista.chave && c.status !== "Finalizada") {
                    idCorrida = item.key;
                    montarTelaCorrida(c);
                    encontrou = true;
                }
            });
            if(!encontrou) mostrarTela('m-status');
        });
    }

    function toggleOnline() {
        isOnline = !isOnline;
        const btn = document.getElementById('btn-toggle');
        const badge = document.getElementById('badge-status');

        if(isOnline) {
            btn.innerText = "FICAR OFFLINE"; btn.className = "btn btn-red";
            badge.innerText = "Status: Online"; badge.className = "status-badge status-on";
            
            db.ref('corridas_abertas').on('value', snap => {
                if(!isOnline || idCorrida) return;
                snap.forEach(item => {
                    const c = item.val();
                    if(c.status === "Aguardando") {
                        if(confirm("🚨 NOVA CORRIDA!\n\nOrigem: " + c.origem)) aceitar(item.key, c);
                    }
                });
            });
        } else {
            btn.innerText = "FICAR ONLINE"; btn.className = "btn btn-yellow";
            badge.innerText = "Status: Offline"; badge.className = "status-badge status-off";
            db.ref('corridas_abertas').off();
        }
    }

    function aceitar(id, dados) {
        idCorrida = id;
        db.ref('corridas_abertas/' + id).update({
            status: "Aceita", idMotorista: motorista.chave, nomeMotorista: motorista.nome
        }).then(() => montarTelaCorrida(dados));
    }

    function montarTelaCorrida(dados) {
        dadosCorrida = dados;
        document.getElementById('val-total').innerText = dados.valor;
        document.getElementById('info-viagem').innerHTML = `<b>Passageiro:</b> ${dados.cliente}<br><b>Origem:</b> ${dados.origem}<br><b>Destino:</b> ${dados.destino}<br><b>Pagamento:</b> ${dados.pagamento}`;
        
        if(dados.status === "Em Viagem") {
            proximaFase(true);
        } else {
            document.getElementById('fase-titulo').innerText = "BUSCANDO PASSAGEIRO";
            document.getElementById('fase-titulo').style.color = "var(--orange)";
            document.getElementById('btn-gps-busca').style.display = "block";
            document.getElementById('btn-gps-destino').style.display = "none";
            document.getElementById('btn-acao-corrida').style.display = "block";
            document.getElementById('area-finalizar').style.display = "none";
        }
        mostrarTela('m-corrida');
    }

    function proximaFase(recuperando = false) {
        if(!recuperando) db.ref('corridas_abertas/' + idCorrida).update({ status: "Em Viagem" });
        document.getElementById('fase-titulo').innerText = "EM VIAGEM";
        document.getElementById('fase-titulo').style.color = "var(--blue)";
        document.getElementById('btn-gps-busca').style.display = "none";
        document.getElementById('btn-gps-destino').style.display = "block";
        document.getElementById('btn-acao-corrida').style.display = "none";
        document.getElementById('area-finalizar').style.display = "block";
    }

    function abrirNavegador(tipo) {
        const local = (tipo === 'origem') ? dadosCorrida.origem : dadosCorrida.destino;
        window.location.href = "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(local);
    }

    function finalizarCorrida() {
        if(confirm("Confirmar recebimento e finalizar?")) {
            db.ref('corridas_abertas/' + idCorrida).update({ status: "Finalizada" }).then(() => {
                idCorrida = null;
                mostrarTela('m-status');
            });
        }
    }

    function fazerLogin() {
        const email = document.getElementById('l-email').value;
        const senha = document.getElementById('l-senha').value;
        localStorage.setItem('pindavai_email', email);
        localStorage.setItem('pindavai_senha', senha);
        autoLogin(email, senha);
    }

    function logout() { localStorage.clear(); location.reload(); }
    function mostrarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
