<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAÍ MOTORISTA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ffcc00; --dark: #1a1a1a; --danger: #dc3545; --blue: #4285F4; --success: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; text-align:center; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; }
        .btn-yellow { background: var(--primary); color: var(--dark); }
        .btn-red { background: var(--danger); color: white; }
        .btn-gps { background: #4285F4; color: white; padding: 12px; font-size: 14px; margin-bottom: 10px; border-radius: 8px; border: none; width: 100%; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .info-box { text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px; border-left: 5px solid var(--primary); margin: 10px 0; font-size: 14px; }
        .badge-parada { background: #fff3cd; color: #856404; padding: 5px; border-radius: 5px; font-weight: bold; display: block; margin-bottom: 10px; border: 1px solid #ffeeba; }
    </style>
</head>
<body>
    <audio id="audioNotificacao" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" loop preload="auto"></audio>

    <div id="m-login" class="screen active">
        <div class="card">
            <h1>PINDAVAÍ</h1>
            <input type="email" id="l-email" placeholder="E-mail">
            <input type="password" id="l-senha" placeholder="Senha">
            <button class="btn btn-yellow" onclick="fazerLogin()">ENTRAR</button>
            <button onclick="mostrarTela('m-cadastro')" style="background:none; border:none; color:blue; margin-top:15px;">Criar conta motorista</button>
        </div>
    </div>

    <div id="m-cadastro" class="screen">
        <div class="card">
            <h3>Cadastro Motorista</h3>
            <div style="max-height: 350px; overflow-y: auto;">
                <input type="text" id="c-nome" placeholder="Nome">
                <input type="email" id="c-email" placeholder="E-mail">
                <input type="tel" id="c-tel" placeholder="WhatsApp">
                <input type="text" id="c-cpf" placeholder="CPF">
                <input type="text" id="c-veiculo" placeholder="Veículo/Cor">
                <input type="text" id="c-placa" placeholder="Placa">
                <input type="password" id="c-senha" placeholder="Senha">
            </div>
            <button class="btn btn-yellow" onclick="acaoCadastrar()">CADASTRAR</button>
            <button onclick="mostrarTela('m-login')" style="background:none; border:none; margin-top:10px;">Voltar</button>
        </div>
    </div>

    <div id="m-status" class="screen">
        <div class="card">
            <h3 id="nome-exibicao">---</h3>
            <div id="status-text" style="color:orange; font-weight:bold; margin-bottom:20px;">OFFLINE (AMARELO)</div>
            <button id="btn-toggle" class="btn btn-yellow" onclick="toggleOnline()">FICAR ONLINE</button>
            <button onclick="sairDefinitivamente()" style="color:red; background:none; border:none; margin-top:30px;">Sair da Conta</button>
        </div>
    </div>

    <div id="m-chamada" class="screen" style="background: rgba(0,0,0,0.9);">
        <div class="card">
            <h2 style="color: var(--primary)">🔔 NOVA VIAGEM</h2>
            <div id="detalhes-chamada" class="info-box">
                </div>
            <button class="btn btn-yellow" onclick="aceitarCorrida()">ACEITAR CORRIDA</button>
            <button class="btn" style="background: #eee;" onclick="recusarCorrida()">RECUSAR</button>
        </div>
    </div>

    <div id="m-viagem" class="screen">
        <div class="card">
            <h2 id="titulo-viagem">A CAMINHO</h2>
            <button class="btn-gps" onclick="abrirNavegacao()"><i class="fas fa-map-marker-alt"></i> ABRIR GPS</button>
            <div id="destino-texto" class="info-box"></div>
            <button class="btn btn-yellow" id="btn-proximo" onclick="proximaEtapa()">JÁ EMBARQUEI O CLIENTE</button>
            <button class="btn btn-red" id="btn-finalizar" style="display:none;" onclick="finalizarCorrida()">FINALIZAR CORRIDA</button>
        </div>
    </div>

    <script>
    const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let motoristaId, dadosMotorista, isOnline = false, idCorridaAtiva = null;
    let enderecoNavegacao = "";

    function mostrarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function acaoCadastrar() {
        const d = {
            nome: document.getElementById('c-nome').value,
            email: document.getElementById('c-email').value,
            telefone: document.getElementById('c-tel').value,
            cpf: document.getElementById('c-cpf').value,
            veiculo: document.getElementById('c-veiculo').value,
            placa: document.getElementById('c-placa').value,
            senha: document.getElementById('c-senha').value,
            status: "ativo"
        };
        db.ref('motoristas').push(d).then(() => { alert("Cadastrado!"); mostrarTela('m-login'); });
    }

    function fazerLogin() {
        const email = document.getElementById('l-email').value;
        const senha = document.getElementById('l-senha').value;
        db.ref('motoristas').orderByChild('email').equalTo(email).once('value', snap => {
            if(snap.exists()){
                const id = Object.keys(snap.val())[0];
                const user = snap.val()[id];
                if(user.senha === senha) {
                    motoristaId = id; dadosMotorista = user;
                    document.getElementById('nome-exibicao').innerText = "Olá, " + user.nome;
                    iniciarRastreamento();
                    mostrarTela('m-status');
                }
            }
        });
    }

    function toggleOnline() {
        isOnline = !isOnline;
        document.getElementById('status-text').innerText = isOnline ? "ONLINE (VERDE)" : "OFFLINE (AMARELO)";
        document.getElementById('status-text').style.color = isOnline ? "green" : "orange";
        document.getElementById('btn-toggle').innerText = isOnline ? "FICAR OFFLINE" : "FICAR ONLINE";
        if(isOnline) ouvirCorridas();
    }

    function ouvirCorridas() {
        db.ref('corridas_pendentes').on('child_added', snap => {
            const c = snap.val();
            if(isOnline && !idCorridaAtiva && c.status === "pendente") {
                idCorridaAtiva = snap.key;
                
                // Verifica se tem paradas para avisar o motorista
                let avisoParada = (c.paradas && c.paradas.length > 0) ? `<span class="badge-parada">⚠️ VIAGEM COM PARADA</span>` : "";
                
                document.getElementById('detalhes-chamada').innerHTML = `
                    ${avisoParada}
                    <b>Passageiro:</b> ${c.nome}<br>
                    <b>Embarque:</b> ${c.partida}<br>
                    <b>Destino Final:</b> ${c.destino}<br><br>
                    <b>Pagamento:</b> ${c.pagamento || 'Dinheiro'}<br>
                    <b style="font-size:18px; color:green">RECEBER: ${c.valor}</b>
                `;
                document.getElementById('audioNotificacao').play();
                mostrarTela('m-chamada');
            }
        });
    }

    function aceitarCorrida() {
        db.ref('corridas_pendentes/'+idCorridaAtiva).update({ 
            status: "A caminho", motoristaId: motoristaId, 
            motoristaNome: dadosMotorista.nome, motoristaPlaca: dadosMotorista.placa 
        });
        document.getElementById('audioNotificacao').pause();
        db.ref('corridas_pendentes/'+idCorridaAtiva).once('value', snap => {
            enderecoNavegacao = snap.val().partida;
            document.getElementById('destino-texto').innerText = "BUSCAR EM: " + snap.val().partida;
            mostrarTela('m-viagem');
        });
    }

    function proximaEtapa() {
        db.ref('corridas_pendentes/'+idCorridaAtiva).once('value', snap => {
            const c = snap.val();
            let proxEndereco = "";

            if(c.paradas && c.paradas.length > 0) {
                proxEndereco = c.paradas[0];
                document.getElementById('destino-texto').innerText = "PRÓXIMA PARADA: " + proxEndereco;
                let novasParadas = c.paradas.slice(1);
                db.ref('corridas_pendentes/'+idCorridaAtiva).update({ paradas: novasParadas });
            } else {
                proxEndereco = c.destino;
                document.getElementById('destino-texto').innerText = "DESTINO FINAL: " + proxEndereco;
                document.getElementById('btn-proximo').style.display = "none";
                document.getElementById('btn-finalizar').style.display = "flex";
            }

            enderecoNavegacao = proxEndereco;
            document.getElementById('titulo-viagem').innerText = "EM VIAGEM (PRETO)";
            db.ref('corridas_pendentes/'+idCorridaAtiva).update({ status: "Em Viagem" });
        });
    }

    function abrirNavegacao() {
        if(!enderecoNavegacao) return;
        window.open("https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(enderecoNavegacao), '_blank');
    }

    function finalizarCorrida() {
        db.ref('corridas_pendentes/'+idCorridaAtiva).update({ status: "Finalizada" }).then(() => {
            idCorridaAtiva = null;
            document.getElementById('btn-proximo').style.display = "flex";
            document.getElementById('btn-finalizar').style.display = "none";
            document.getElementById('titulo-viagem').innerText = "A CAMINHO";
            mostrarTela('m-status');
        });
    }

    function recusarCorrida() {
        idCorridaAtiva = null;
        document.getElementById('audioNotificacao').pause();
        mostrarTela('m-status');
    }

    function sairDefinitivamente() {
        if(motoristaId) db.ref('localizacao_motoristas/'+motoristaId).remove().then(() => location.reload());
    }

    function iniciarRastreamento() {
        navigator.geolocation.watchPosition(pos => {
            if(!motoristaId) return;
            let st = isOnline ? (idCorridaAtiva ? "ocupado" : "disponivel") : "offline";
            db.ref('localizacao_motoristas/'+motoristaId).set({
                nome: dadosMotorista.nome, lat: pos.coords.latitude, lon: pos.coords.longitude, status: st, timestamp: Date.now()
            });
        }, null, { enableHighAccuracy: true });
    }
    </script>
</body>
</html>
