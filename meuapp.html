<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAÍ MOTORISTA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ffcc00; --dark: #1a1a1a; --success: #28a745; --danger: #dc3545; --blue: #4285F4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; overscroll-behavior: none; }
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
        .btn-yellow { background: var(--primary); color: #000; }
        .btn-red { background: var(--danger); color: #fff; }
        .btn-blue { background: var(--blue); color: #fff; }
        input { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .destaque { color: var(--blue); font-weight: bold; font-size: 18px; display: block; margin: 10px 0; }
    </style>
</head>
<body>

    <audio id="audioNotificacao" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" loop preload="auto"></audio>

    <div id="m-login" class="screen active">
        <div class="card">
            <h2 style="margin:0">PINDAVAÍ</h2>
            <p style="font-size: 12px; color: #666; margin-bottom: 20px;">MOTORISTA</p>
            <input type="text" id="l-email" placeholder="ID Motorista">
            <input type="password" id="l-senha" placeholder="Senha">
            <button class="btn btn-yellow" onclick="fazerLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="m-status" class="screen">
        <div class="card">
            <h3 id="nome-exibicao">Olá!</h3>
            <p id="txt-status" style="color: #999;">Você está Offline</p>
            <button id="btn-toggle" class="btn btn-yellow" onclick="toggleOnline()">FICAR ONLINE</button>
        </div>
    </div>

    <div id="m-chamada" class="screen" style="background: rgba(0,0,0,0.9);">
        <div class="card" style="border: 5px solid var(--primary);">
            <h2 style="color: #ff6600">NOVA CHAMADA!</h2>
            <div id="detalhes-chamada" style="text-align: left; margin: 20px 0;"></div>
            <button class="btn btn-yellow" onclick="aceitarCorrida()">ACEITAR</button>
            <button class="btn" style="background: #eee;" onclick="recusarCorrida()">RECUSAR</button>
        </div>
    </div>

    <div id="m-viagem" class="screen">
        <div class="card">
            <h2 id="titulo-viagem" style="color:var(--blue)">INDO RECOLHER</h2>
            <p style="font-size: 12px; color: #888; margin:0">DESTINO:</p>
            <span id="info-viagem" class="destaque">---</span>
            
            <a id="link-gps" href="#" class="btn btn-blue">
                <i class="fas fa-map-marker-alt"></i> ABRIR NAVEGAÇÃO GPS
            </a>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

            <button id="btn-proximo" class="btn btn-yellow" onclick="proximaEtapa()">JÁ RECOLHI O PASSAGEIRO</button>
            <button id="btn-finalizar" class="btn btn-red" style="display:none;" onclick="finalizarCorrida()">FINALIZAR CORRIDA</button>
        </div>
    </div>

    <script>
    const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let motorista = { chave: "moto_01", nome: "Adriano Piloto" };
    let isOnline = false, idCorridaAtiva = null;
    let dadosCorridaAtual = null;
    const somAlerta = document.getElementById('audioNotificacao');

    function fazerLogin() { 
        somAlerta.play().then(() => { somAlerta.pause(); });
        mostrarTela('m-status'); 
        document.getElementById('nome-exibicao').innerText = motorista.nome; 
    }

    function toggleOnline() {
        isOnline = !isOnline;
        const btn = document.getElementById('btn-toggle');
        if(isOnline) {
            btn.innerText = "FICAR OFFLINE"; btn.className = "btn btn-red";
            ouvirCorridas();
        } else {
            btn.innerText = "FICAR ONLINE"; btn.className = "btn btn-yellow";
            db.ref('corridas_abertas').off();
        }
    }

    function ouvirCorridas() {
        db.ref('corridas_abertas').on('value', snap => {
            if(!isOnline || idCorridaAtiva) return;
            const corridas = snap.val();
            for(let id in corridas) {
                if(corridas[id].status === "Aguardando") {
                    idCorridaAtiva = id;
                    dadosCorridaAtual = corridas[id];
                    exibirChamada(corridas[id]);
                    break;
                }
            }
        });
    }

    function exibirChamada(dados) {
        somAlerta.play();
        document.getElementById('detalhes-chamada').innerHTML = `<b>ORIGEM:</b> ${dados.origem}<br><b>DESTINO:</b> ${dados.destino}<br><br><span style="font-size:18px; color:var(--success)"><b>VALOR: R$ ${dados.valor}</b></span>`;
        mostrarTela('m-chamada');
    }

    function atualizarLinkGPS(endereco) {
        // O segredo está aqui: "google.navigation:q=" abre direto o app no Android
        const link = document.getElementById('link-gps');
        link.href = "google.navigation:q=" + encodeURIComponent(endereco);
    }

    function aceitarCorrida() {
        somAlerta.pause();
        document.getElementById('titulo-viagem').innerText = "INDO RECOLHER";
        document.getElementById('info-viagem').innerText = dadosCorridaAtual.origem;
        atualizarLinkGPS(dadosCorridaAtual.origem);
        
        document.getElementById('btn-proximo').style.display = "flex";
        document.getElementById('btn-finalizar').style.display = "none";
        db.ref('corridas_abertas/' + idCorridaAtiva).update({ status: "A caminho", motorista: motorista.nome });
        mostrarTela('m-viagem');
    }

    function proximaEtapa() {
        document.getElementById('titulo-viagem').innerText = "LEVANDO AO DESTINO";
        document.getElementById('info-viagem').innerText = dadosCorridaAtual.destino;
        atualizarLinkGPS(dadosCorridaAtual.destino);
        
        document.getElementById('btn-proximo').style.display = "none";
        document.getElementById('btn-finalizar').style.display = "flex";
        db.ref('corridas_abertas/' + idCorridaAtiva).update({ status: "Em Viagem" });
    }

    function finalizarCorrida() {
        db.ref('corridas_abertas/' + idCorridaAtiva).remove();
        idCorridaAtiva = null;
        mostrarTela('m-status');
    }

    function recusarCorrida() { somAlerta.pause(); idCorridaAtiva = null; mostrarTela('m-status'); }
    function mostrarTela(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
