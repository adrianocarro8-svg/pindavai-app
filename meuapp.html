<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAI - Motorista V13.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #ffcc00; --dark: #1a1a1a; --success: #28a745; --danger: #dc3545; --blue: #007bff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; overscroll-behavior: none; }
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-yellow { background: var(--primary); color: #000; }
        .btn-red { background: var(--danger); color: #fff; }
        .status-badge { padding: 10px 20px; border-radius: 50px; font-weight: bold; margin-bottom: 20px; font-size: 14px; }
        .status-off { background: #eee; color: #666; }
        .status-on { background: rgba(40, 167, 69, 0.1); color: var(--success); border: 1px solid var(--success); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .animar { animation: pulse 1s infinite; }
    </style>
</head>
<body>

    <audio id="audioNotificacao" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" loop></audio>

    <div id="m-login" class="screen active">
        <div class="card">
            <h2>PINDAVAÍ</h2>
            <p style="font-size: 12px; color: #666; margin-bottom: 20px;">PORTAL DO MOTORISTA</p>
            <input type="text" id="l-email" placeholder="Usuário">
            <input type="password" id="l-senha" placeholder="Senha">
            <button class="btn btn-yellow" onclick="fazerLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="m-status" class="screen">
        <div id="badge-status" class="status-badge status-off">Status: Offline</div>
        <div class="card">
            <h3 id="nome-exibicao">Olá!</h3>
            <button id="btn-toggle" class="btn btn-yellow" onclick="toggleOnline()">FICAR ONLINE</button>
            <button class="btn" style="background:none; color:var(--danger); font-size:12px;" onclick="logout()">Sair</button>
        </div>
    </div>

    <div id="m-chamada" class="screen" style="background: rgba(0,0,0,0.9);">
        <div class="card animar" style="border: 4px solid var(--primary);">
            <h2 style="color: #ff6600">NOVA CORRIDA!</h2>
            <div id="detalhes-chamada" style="text-align: left; margin: 15px 0; font-size: 14px;"></div>
            <button class="btn btn-yellow" onclick="aceitarCorrida()">ACEITAR</button>
            <button class="btn" style="background: #eee;" onclick="recusarCorrida()">RECUSAR</button>
        </div>
    </div>

    <div id="m-viagem" class="screen">
        <div class="card">
            <h4 id="p-nome">Passageiro</h4>
            <p id="p-destino" style="font-size: 13px; color: #666;"></p>
            <button class="btn btn-yellow" onclick="finalizarCorrida()">FINALIZAR CORRIDA</button>
        </div>
    </div>

    <script>
    const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let motorista = { chave: "moto_01", nome: "Adriano Piloto" };
    let isOnline = false;
    let watchID = null;
    let idCorridaAtiva = null;
    const somAlerta = document.getElementById('audioNotificacao');

    function fazerLogin() { mostrarTela('m-status'); document.getElementById('nome-exibicao').innerText = motorista.nome; }

    function toggleOnline() {
        isOnline = !isOnline;
        const btn = document.getElementById('btn-toggle');
        if(isOnline) {
            btn.innerText = "FICAR OFFLINE"; btn.className = "btn btn-red";
            iniciarGPS();
            ouvirCorridas();
        } else {
            btn.innerText = "FICAR ONLINE"; btn.className = "btn btn-yellow";
            pararGPS();
        }
    }

    function iniciarGPS() {
        watchID = navigator.geolocation.watchPosition((pos) => {
            db.ref('motoristas_online/' + motorista.chave).set({
                nome: motorista.nome, lat: pos.coords.latitude, lng: pos.coords.longitude, status: "Online"
            });
        }, null, { enableHighAccuracy: true });
    }

    function pararGPS() {
        if(watchID) navigator.geolocation.clearWatch(watchID);
        db.ref('motoristas_online/' + motorista.chave).remove();
        db.ref('corridas_abertas').off();
    }

    function ouvirCorridas() {
        db.ref('corridas_abertas').on('value', snap => {
            if(!isOnline || idCorridaAtiva) return;
            const corridas = snap.val();
            for(let id in corridas) {
                if(corridas[id].status === "Aguardando") {
                    idCorridaAtiva = id;
                    exibirChamada(corridas[id]);
                    break;
                }
            }
        });
    }

    function exibirChamada(dados) {
        // TOCA O SOM AUTOMATICAMENTE
        somAlerta.play().catch(e => console.log("Som aguardando toque"));
        
        document.getElementById('detalhes-chamada').innerHTML = `
            <b>DE:</b> ${dados.origem}<br>
            <b>PARA:</b> ${dados.destino}<br>
            <b>VALOR:</b> R$ ${dados.valor}
        `;
        mostrarTela('m-chamada');
    }

    function aceitarCorrida() {
        somAlerta.pause(); // PARA O SOM
        somAlerta.currentTime = 0;
        db.ref('corridas_abertas/' + idCorridaAtiva).update({ status: "Aceita", nomeMotorista: motorista.nome });
        mostrarTela('m-viagem');
    }

    function recusarCorrida() {
        somAlerta.pause(); // PARA O SOM
        idCorridaAtiva = null;
        mostrarTela('m-status');
    }

    function finalizarCorrida() {
        db.ref('corridas_abertas/' + idCorridaAtiva).update({ status: "Finalizada" });
        idCorridaAtiva = null;
        mostrarTela('m-status');
    }

    function mostrarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function logout() { pararGPS(); location.reload(); }
    </script>
</body>
</html>
