<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAI - Motorista V12.0</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #ffcc00; --dark: #1a1a1a; --success: #28a745; --danger: #dc3545; --blue: #007bff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; overscroll-behavior: none; }
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-yellow { background: var(--primary); color: #000; }
        .btn-red { background: var(--danger); color: #fff; }
        .status-badge { padding: 10px 20px; border-radius: 50px; font-weight: bold; margin-bottom: 20px; font-size: 14px; }
        .status-off { background: #eee; color: #666; }
        .status-on { background: rgba(40, 167, 69, 0.1); color: var(--success); border: 1px solid var(--success); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="m-login" class="screen active">
        <div class="card">
            <h2 style="margin-bottom: 5px;">PINDAVAÍ</h2>
            <p style="font-size: 12px; color: #666; margin-bottom: 20px;">PORTAL DO MOTORISTA</p>
            <input type="text" id="l-email" placeholder="Usuário">
            <input type="password" id="l-senha" placeholder="Senha">
            <button class="btn btn-yellow" onclick="fazerLogin()">ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <div id="m-status" class="screen">
        <div id="badge-status" class="status-badge status-off">Status: Offline</div>
        <div class="card">
            <h3 id="nome-exibicao">Bem-vindo</h3>
            <p style="font-size: 14px; color: #888; margin-bottom: 20px;">Pindamonhangaba - SP</p>
            
            <button id="btn-toggle" class="btn btn-yellow" onclick="toggleOnline()">FICAR ONLINE</button>
            <button class="btn" style="background:none; color:var(--danger); font-size:12px; margin-top: 20px;" onclick="logout()">Sair / Trocar Conta</button>
        </div>
        <p style="font-size: 10px; color: #aaa; margin-top: 20px;">Mantenha o GPS ativo para receber corridas</p>
    </div>

    <script>
    // --- CONFIGURAÇÃO DO SEU FIREBASE ---
    const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Dados do motorista (Simulado - No futuro virá do seu banco de cadastros)
    let motorista = { 
        chave: "moto_01", 
        nome: "Adriano Piloto",
        carro: "Pinda Car 01"
    };

    let isOnline = false;
    let watchID = null;

    // --- FUNÇÃO DE LOGIN SIMPLES ---
    function fazerLogin() {
        const user = document.getElementById('l-email').value;
        const pass = document.getElementById('l-senha').value;

        if(user === "1" && pass === "1") {
            document.getElementById('nome-exibicao').innerText = motorista.nome;
            mostrarTela('m-status');
        } else {
            alert("Usuário ou senha incorretos!");
        }
    }

    // --- CONTROLE DE ONLINE / OFFLINE ---
    function toggleOnline() {
        isOnline = !isOnline;
        const btn = document.getElementById('btn-toggle');
        const badge = document.getElementById('badge-status');

        if(isOnline) {
            btn.innerText = "FICAR OFFLINE";
            btn.className = "btn btn-red";
            badge.innerText = "Status: Online e Rastreando";
            badge.className = "status-badge status-on";
            startRastreio(); // Inicia o GPS
        } else {
            btn.innerText = "FICAR ONLINE";
            btn.className = "btn btn-yellow";
            badge.innerText = "Status: Offline";
            badge.className = "status-badge status-off";
            stopRastreio(); // Para o GPS
        }
    }

    // --- SISTEMA DE RASTREAMENTO REAL ---
    function startRastreio() {
        if ("geolocation" in navigator) {
            // watchPosition envia atualizações sempre que o motorista se mover
            watchID = navigator.geolocation.watchPosition((pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;

                console.log("GPS Atualizado:", lat, lng);

                // Grava na pasta que a Central Suprema monitora
                db.ref('motoristas_online/' + motorista.chave).set({
                    nome: motorista.nome,
                    lat: lat,
                    lng: lng,
                    status: "Online",
                    ultimaAtualizacao: Date.now()
                });

            }, (err) => {
                alert("Erro ao acessar GPS. Verifique as permissões do navegador.");
                console.error(err);
                toggleOnline(); // Volta para offline se der erro
            }, {
                enableHighAccuracy: true, // Força o uso do GPS real
                maximumAge: 0,
                timeout: 10000
            });
        } else {
            alert("Seu celular não suporta Geolocalização.");
        }
    }

    function stopRastreio() {
        if(watchID) {
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
        }
        // Remove o motorista do mapa na central ao ficar offline
        db.ref('motoristas_online/' + motorista.chave).remove();
    }

    function mostrarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function logout() {
        stopRastreio();
        location.reload();
    }

    // Evita que o app feche acidentalmente se estiver em modo APK
    window.onbeforeunload = function() {
        if(isOnline) return "Você está online. Deseja realmente sair?";
    };

    </script>
</body>
</html>
