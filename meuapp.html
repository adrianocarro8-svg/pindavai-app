<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAÍ MOTORISTA - V6</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ffcc00; --dark: #1a1a1a; --danger: #dc3545; --blue: #4285F4; --waze: #33ccff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; text-align:center; overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; }
        .active { display: flex; }
        .card { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; transition: 0.3s; }
        .btn-yellow { background: var(--primary); color: var(--dark); }
        .btn-red { background: var(--danger); color: white; }
        input { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        #map { width: 100%; height: 280px; border-radius: 15px; margin-bottom: 10px; background: #ddd; position: relative; }
        .star-rating { font-size: 40px; color: #ddd; cursor: pointer; margin: 15px 0; }
        .star-rating i.active { color: var(--primary); }
        
        /* Menu de GPS que sobe do fundo */
        #menu-gps { display:none; position: fixed; bottom: 0; left: 0; width: 100%; background: white; z-index: 3000; padding: 25px; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); box-sizing: border-box; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>
    <audio id="audioNotificacao" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" loop preload="auto"></audio>

    <div id="m-login" class="screen active">
        <div class="card">
            <h1 style="margin-bottom:5px;">PINDAVAÍ</h1>
            <p style="color: #666; margin-top:0;">Painel do Motorista</p>
            <input type="email" id="l-email" placeholder="E-mail">
            <input type="password" id="l-senha" placeholder="Senha">
            <button class="btn btn-yellow" onclick="fazerLogin()">ENTRAR</button>
            <button class="btn" style="background:none; color:var(--blue); font-size:14px;" onclick="mostrarTela('m-cadastro')">Criar conta de motorista</button>
        </div>
    </div>

    <div id="m-cadastro" class="screen">
        <div class="card">
            <h2>Novo Motorista</h2>
            <div style="max-height: 400px; overflow-y: auto; padding-right: 5px; text-align: left;">
                <label style="font-size: 12px; font-weight: bold;">DADOS PESSOAIS</label>
                <input type="text" id="c-nome" placeholder="Nome Completo">
                <input type="email" id="c-email" placeholder="E-mail">
                <input type="tel" id="c-tel" placeholder="Telefone/WhatsApp">
                <input type="text" id="c-cpf" placeholder="CPF">
                <label style="font-size: 12px; font-weight: bold; margin-top:10px; display:block;">DADOS DO VEÍCULO</label>
                <input type="text" id="c-veiculo" placeholder="Veículo (Ex: Fiat Uno Prata)">
                <input type="text" id="c-placa" placeholder="Placa do Veículo">
                <input type="password" id="c-senha" placeholder="Crie uma Senha">
            </div>
            <button class="btn btn-yellow" onclick="fazerCadastro()">FINALIZAR CADASTRO</button>
            <button class="btn" style="background:none; color:var(--blue); font-size:14px;" onclick="mostrarTela('m-login')">Voltar ao Login</button>
        </div>
    </div>

    <div id="m-status" class="screen">
        <div class="card">
            <h3 id="nome-exibicao" style="margin-bottom: 5px;">---</h3>
            <div id="status-text" style="color:orange; font-weight:bold; margin-bottom:20px; font-size: 20px;">OFFLINE</div>
            <button id="btn-toggle" class="btn btn-yellow" onclick="toggleOnline()" style="height: 80px; font-size: 18px;">FICAR ONLINE</button>
            <button onclick="sairDefinitivamente()" style="margin-top:30px; color:red; border:none; background:none; cursor:pointer;">Sair da Conta</button>
        </div>
    </div>

    <div id="m-chamada" class="screen" style="background: rgba(0,0,0,0.95);">
        <div class="card">
            <h2 style="color: var(--primary);">🔔 NOVA VIAGEM!</h2>
            <div id="detalhes-chamada" style="text-align: left; margin: 20px 0; background: #f9f9f9; padding: 15px; border-radius: 10px;"></div>
            <button class="btn btn-yellow" onclick="aceitarCorrida()">ACEITAR CORRIDA</button>
            <button class="btn" style="background: #444; color: white;" onclick="recusarCorrida()">RECUSAR</button>
        </div>
    </div>

    <div id="m-viagem" class="screen">
        <div class="card" style="position: relative;">
            <div style="position: relative; overflow: hidden; border-radius: 15px;">
                <div id="map"></div>
                <button onclick="abrirMenuGPS()" style="position: absolute; bottom: 15px; right: 10px; z-index: 1000; background: var(--blue); color: white; border: none; border-radius: 50%; width: 55px; height: 55px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; font-size: 22px;">
                    <i class="fas fa-location-arrow"></i>
                </button>
            </div>

            <h3 id="titulo-viagem" style="margin: 10px 0; color: #333;">A CAMINHO</h3>
            <p id="destino-texto" style="font-size: 14px; color: #666; margin-bottom: 15px; height: 40px; overflow: hidden;"></p>
            
            <button class="btn btn-yellow" id="btn-proximo" onclick="proximaEtapa()">EMBARQUEI PASSAGEIRO</button>
            <button class="btn btn-red" id="btn-finalizar" style="display:none;" onclick="finalizarCorrida()">FINALIZAR VIAGEM</button>
        </div>

        <div id="menu-gps">
            <h3 style="margin-top: 0;">Abrir Navegação Externa</h3>
            <p style="font-size: 13px; color: #777;">Escolha seu aplicativo preferido:</p>
            <button class="btn" style="background: #4285F4; color: white;" onclick="abrirAppGPS('maps')">
                <i class="fab fa-google"></i> Google Maps
            </button>
            <button class="btn" style="background: #33ccff; color: white;" onclick="abrirAppGPS('waze')">
                <i class="fab fa-waze"></i> Waze
            </button>
            <button class="btn" style="background: #eee; color: #333; margin-top: 15px;" onclick="fecharMenuGPS()">Cancelar</button>
        </div>
    </div>

    <div id="m-avaliacao-p" class="screen">
        <div class="card">
            <h2>Viagem Finalizada!</h2>
            <p>Como foi o passageiro <b id="nome-passageiro-aval">---</b>?</p>
            <div class="star-rating" id="stars-p">
                <i class="fas fa-star" onclick="setRatingP(1)"></i>
                <i class="fas fa-star" onclick="setRatingP(2)"></i>
                <i class="fas fa-star" onclick="setRatingP(3)"></i>
                <i class="fas fa-star" onclick="setRatingP(4)"></i>
                <i class="fas fa-star" onclick="setRatingP(5)"></i>
            </div>
            <button class="btn btn-yellow" onclick="enviarAvaliacaoPassageiro()">ENVIAR AVALIAÇÃO</button>
        </div>
    </div>

    <script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCjP9yWZK4AUkJmswfb5iZVTLENDfTmP8o",
        authDomain: "meuappmobilidade-a6f93.firebaseapp.com",
        databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com",
        projectId: "meuappmobilidade-a6f93",
        storageBucket: "meuappmobilidade-a6f93.firebasestorage.app",
        messagingSenderId: "1001774053416",
        appId: "1:1001774053416:web:dcda8aee94322da8559d1d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let motoristaId, dadosMotorista, isOnline = false, idCorridaAtiva = null;
    let map, markerMotorista, routeLayer, myLat, myLon, coordDestino = null;
    let notaPassageiro = 0, nomePassageiroAtual = "";

    // Inicia o mapa
    function initMap() {
        if (map) return;
        map = L.map('map', {zoomControl: false}).setView([-22.9255, -45.4548], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        markerMotorista = L.marker([-22.9255, -45.4548]).addTo(map);
    }

    function mostrarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'm-viagem') {
            setTimeout(() => { 
                initMap(); 
                map.invalidateSize();
            }, 300);
        }
    }

    // --- CADASTRO E LOGIN ---
    function fazerCadastro() {
        const d = {
            nome: document.getElementById('c-nome').value,
            email: document.getElementById('c-email').value,
            telefone: document.getElementById('c-tel').value,
            cpf: document.getElementById('c-cpf').value,
            veiculo: document.getElementById('c-veiculo').value,
            placa: document.getElementById('c-placa').value,
            senha: document.getElementById('c-senha').value,
            status: "ativo", cadastroEm: Date.now()
        };
        if(Object.values(d).some(v => !v)) return alert("Preencha todos os campos!");
        db.ref('motoristas').push(d).then(() => { alert("Cadastro realizado!"); mostrarTela('m-login'); });
    }

    function fazerLogin() {
        const email = document.getElementById('l-email').value;
        const senha = document.getElementById('l-senha').value;
        db.ref('motoristas').orderByChild('email').equalTo(email).once('value', snap => {
            if(snap.exists()){
                const id = Object.keys(snap.val())[0];
                const user = snap.val()[id];
                if(user.senha === senha) {
                    motoristaId = id; dadosMotorista = user;
                    document.getElementById('nome-exibicao').innerText = "Olá, " + user.nome;
                    iniciarRastreamento(); mostrarTela('m-status');
                } else alert("Senha incorreta!");
            } else alert("Motorista não cadastrado!");
        });
    }

    function toggleOnline() {
        isOnline = !isOnline;
        const statusTxt = document.getElementById('status-text');
        statusTxt.innerText = isOnline ? "ONLINE (VERDE)" : "OFFLINE (AMARELO)";
        statusTxt.style.color = isOnline ? "green" : "orange";
        document.getElementById('btn-toggle').innerText = isOnline ? "FICAR OFFLINE" : "FICAR ONLINE";
        if(isOnline) ouvirCorridas();
    }

    function ouvirCorridas() {
        db.ref('corridas_pendentes').on('child_added', snap => {
            const c = snap.val();
            if(isOnline && !idCorridaAtiva && c.status === "pendente") {
                idCorridaAtiva = snap.key;
                nomePassageiroAtual = c.nome;
                document.getElementById('detalhes-chamada').innerHTML = `
                    <b>Passageiro:</b> ${c.nome}<br>
                    <b>Origem:</b> ${c.partida}<br>
                    <b>Destino:</b> ${c.destino}<br>
                    <b>Valor:</b> ${c.valor}
                `;
                document.getElementById('audioNotificacao').play();
                mostrarTela('m-chamada');
            }
        });
    }

    // --- ROTA E NAVEGAÇÃO ---
    async function desenharRota(enderecoDestino) {
        if(routeLayer) map.removeLayer(routeLayer);
        const apiKey = "60cdf3de97e8477a8d0936582f4cd072";
        try {
            const geo = await fetch(`https://api.geoapify.com/v1/geocode/search?text=${encodeURIComponent(enderecoDestino + " Pindamonhangaba")}&apiKey=${apiKey}`).then(r => r.json());
            if(!geo.features.length) return;
            const c = geo.features[0].geometry.coordinates;
            coordDestino = { lat: c[1], lon: c[0] }; // Salva para o GPS externo
            
            const route = await fetch(`https://api.geoapify.com/v1/routing?waypoints=${myLat},${myLon}|${c[1]},${c[0]}&mode=drive&apiKey=${apiKey}`).then(r => r.json());
            if(route.features) {
                routeLayer = L.geoJSON(route.features[0], { style: { color: '#4285F4', weight: 6 } }).addTo(map);
                map.fitBounds(routeLayer.getBounds(), {padding: [30, 30]});
            }
        } catch(e) { console.error(e); }
    }

    function abrirMenuGPS() {
        if(!coordDestino) return alert("Aguardando coordenadas...");
        document.getElementById('menu-gps').style.display = "block";
    }
    function fecharMenuGPS() { document.getElementById('menu-gps').style.display = "none"; }

    function abrirAppGPS(tipo) {
        let url = tipo === 'maps' 
            ? `https://www.google.com/maps/dir/?api=1&destination=${coordDestino.lat},${coordDestino.lon}&travelmode=driving`
            : `https://www.waze.com/ul?ll=${coordDestino.lat},${coordDestino.lon}&navigate=yes`;
        window.open(url, '_blank');
        fecharMenuGPS();
    }

    // --- CICLO DA CORRIDA ---
    function aceitarCorrida() {
        db.ref('corridas_pendentes/'+idCorridaAtiva).once('value', snap => {
            const c = snap.val();
            db.ref('corridas_pendentes/'+idCorridaAtiva).update({ 
                status: "A caminho", motoristaId, motoristaNome: dadosMotorista.nome, motoristaPlaca: dadosMotorista.placa 
            });
            document.getElementById('audioNotificacao').pause();
            document.getElementById('destino-texto').innerText = "Vá buscar em: " + c.partida;
            mostrarTela('m-viagem');
            desenharRota(c.partida);
        });
    }

    function proximaEtapa() {
        db.ref('corridas_pendentes/'+idCorridaAtiva).once('value', snap => {
            const c = snap.val();
            document.getElementById('destino-texto').innerText = "Destino final: " + c.destino;
            document.getElementById('titulo-viagem').innerText = "EM VIAGEM";
            document.getElementById('btn-proximo').style.display = "none";
            document.getElementById('btn-finalizar').style.display = "flex";
            db.ref('corridas_pendentes/'+idCorridaAtiva).update({ status: "Em Viagem" });
            desenharRota(c.destino);
        });
    }

    function finalizarCorrida() {
        db.ref('corridas_pendentes/'+idCorridaAtiva).update({ status: "Finalizada" }).then(() => {
            document.getElementById('nome-passageiro-aval').innerText = nomePassageiroAtual;
            mostrarTela('m-avaliacao-p');
        });
    }

    // --- AVALIAÇÃO ---
    function setRatingP(n) {
        notaPassageiro = n;
        document.querySelectorAll('#stars-p i').forEach((s, i) => s.classList.toggle('active', i < n));
    }

    function enviarAvaliacaoPassageiro() {
        if(!notaPassageiro) return alert("Selecione as estrelas!");
        db.ref('avaliacoes_passageiros').push({ motoristaId, passageiroNome: nomePassageiroAtual, nota: notaPassageiro, timestamp: Date.now() });
        idCorridaAtiva = null; 
        if(routeLayer) map.removeLayer(routeLayer);
        document.getElementById('btn-proximo').style.display = "flex";
        document.getElementById('btn-finalizar').style.display = "none";
        document.getElementById('titulo-viagem').innerText = "A CAMINHO";
        mostrarTela('m-status');
    }

    // --- RASTREAMENTO GPS DO MOTORISTA ---
    function iniciarRastreamento() {
        navigator.geolocation.watchPosition(pos => {
            myLat = pos.coords.latitude; myLon = pos.coords.longitude;
            if(markerMotorista) markerMotorista.setLatLng([myLat, myLon]);
            if(motoristaId) {
                let st = isOnline ? (idCorridaAtiva ? "ocupado" : "disponivel") : "offline";
                db.ref('localizacao_motoristas/'+motoristaId).set({
                    nome: dadosMotorista.nome, lat: myLat, lon: myLon, status: st, timestamp: Date.now()
                });
            }
        }, null, { enableHighAccuracy: true });
    }

    function sairDefinitivamente() {
        if(motoristaId) db.ref('localizacao_motoristas/'+motoristaId).remove().then(() => location.reload());
    }

    function recusarCorrida() {
        idCorridaAtiva = null;
        document.getElementById('audioNotificacao').pause();
        mostrarTela('m-status');
    }
    </script>
</body>
</html>
