<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAÍ MOTORISTA</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ffcc00; --dark: #1a1a1a; --success: #28a745; --danger: #dc3545; --blue: #4285F4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-yellow { background: var(--primary); }
        .btn-red { background: var(--danger); color: #fff; }
        .btn-blue { background: var(--blue); color: #fff; }
        input { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-sair { position: absolute; top: 20px; right: 20px; background: #eee; padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <audio id="audioNotificacao" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" loop preload="auto"></audio>

    <div id="m-login" class="screen active">
        <div class="card">
            <h1>PINDAVAÍ</h1>
            <p>Motorista</p>
            <input type="email" id="l-email" placeholder="E-mail">
            <input type="password" id="l-senha" placeholder="Senha">
            <button class="btn btn-yellow" onclick="fazerLogin()">ENTRAR</button>
            <p onclick="mostrarTela('m-cadastro')" style="cursor:pointer; color:blue; margin-top:20px;">Quero ser motorista</p>
        </div>
    </div>

    <div id="m-cadastro" class="screen">
        <div class="card">
            <h3>Cadastro Motorista</h3>
            <input type="text" id="c-nome" placeholder="Nome Completo">
            <input type="email" id="c-email" placeholder="E-mail">
            <input type="tel" id="c-tel" placeholder="Telefone com DDD">
            <input type="text" id="c-cpf" placeholder="CPF">
            <input type="text" id="c-veiculo" placeholder="Veículo (Ex: Fiat Uno)">
            <input type="text" id="c-placa" placeholder="Placa">
            <input type="password" id="c-senha" placeholder="Crie uma Senha">
            <button class="btn btn-yellow" onclick="acaoCadastroMotorista()">CADASTRAR</button>
            <p onclick="mostrarTela('m-login')" style="cursor:pointer; margin-top:15px;">Voltar</p>
        </div>
    </div>

    <div id="m-status" class="screen">
        <button class="btn-sair" onclick="sairApp()">SAIR <i class="fas fa-sign-out-alt"></i></button>
        <div class="card">
            <h3 id="nome-exibicao">---</h3>
            <div id="status-text" style="margin-bottom:15px; font-weight:bold; color:#ffcc00;">OFFLINE (AMARELO)</div>
            <button id="btn-toggle" class="btn btn-yellow" onclick="toggleOnline()">FICAR ONLINE</button>
        </div>
    </div>

    <div id="m-chamada" class="screen" style="background: rgba(0,0,0,0.9);">
        <div class="card">
            <h2>🔔 NOVA VIAGEM!</h2>
            <div id="detalhes-chamada" style="text-align: left; margin: 20px 0;"></div>
            <button class="btn btn-yellow" onclick="aceitarCorrida()">ACEITAR</button>
            <button class="btn" style="background: #eee;" onclick="recusarCorrida()">RECUSAR</button>
        </div>
    </div>

    <div id="m-viagem" class="screen">
        <div class="card">
            <h2 id="titulo-viagem">INDO BUSCAR</h2>
            <button class="btn btn-blue" onclick="abrirGPS()">ABRIR GPS</button>
            <button id="btn-proximo" class="btn btn-yellow" onclick="proximaEtapa()">JÁ RECOLHI O PASSAGEIRO</button>
            <button id="btn-finalizar" class="btn btn-red" style="display:none;" onclick="finalizarCorrida()">FINALIZAR CORRIDA</button>
        </div>
    </div>

    <script>
    const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let motoristaId, dadosMotorista, watchID, currentDestino;
    let isOnline = false, idCorridaAtiva = null, etapaViagem = "buscar";

    function mostrarTela(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function fazerLogin() {
        const email = document.getElementById('l-email').value;
        const senha = document.getElementById('l-senha').value;
        db.ref('motoristas').orderByChild('email').equalTo(email).once('value', snap => {
            if(snap.exists()){
                motoristaId = Object.keys(snap.val())[0];
                dadosMotorista = snap.val()[motoristaId];
                if(dadosMotorista.senha === senha) {
                    document.getElementById('nome-exibicao').innerText = "Olá, " + dadosMotorista.nome;
                    iniciarRastreamento();
                    verificarRecuperacaoDeCorrida(); // NOVA FUNÇÃO AQUI
                } else alert("Senha incorreta");
            } else alert("Motorista não encontrado");
        });
    }

    // FUNÇÃO QUE RECUPERA A CORRIDA SE O MOTORISTA CAIR
    function verificarRecuperacaoDeCorrida() {
        db.ref('corridas_pendentes').once('value', snap => {
            let encontrou = false;
            snap.forEach(c => {
                const dados = c.val();
                if(dados.motoristaId === motoristaId && (dados.status === "A caminho" || dados.status === "Em Viagem")) {
                    idCorridaAtiva = c.key;
                    currentDestino = dados.partida;
                    etapaViagem = (dados.status === "Em Viagem") ? "levar" : "buscar";
                    
                    if(etapaViagem === "levar") {
                        document.getElementById('titulo-viagem').innerText = "EM VIAGEM (PRETO)";
                        document.getElementById('btn-proximo').style.display = "none";
                        document.getElementById('btn-finalizar').style.display = "block";
                    }
                    
                    isOnline = true; // Mantém online para continuar rastreando
                    mostrarTela('m-viagem');
                    encontrou = true;
                }
            });
            if(!encontrou) mostrarTela('m-status');
        });
    }

    function atualizarLocalizacaoNoBanco(lat, lng) {
        if(!motoristaId) return;
        let statusMapa = isOnline ? "disponivel" : "logado";
        if(idCorridaAtiva) statusMapa = (etapaViagem === "buscar") ? "a_caminho" : "em_viagem";
        
        db.ref('localizacao_motoristas/' + motoristaId).set({
            nome: dadosMotorista.nome, placa: dadosMotorista.placa, lat, lng, status: statusMapa
        });
    }

    function iniciarRastreamento() {
        watchID = navigator.geolocation.watchPosition(pos => {
            atualizarLocalizacaoNoBanco(pos.coords.latitude, pos.coords.longitude);
        }, null, { enableHighAccuracy: true });
    }

    function aceitarCorrida() {
        etapaViagem = "buscar";
        db.ref('corridas_pendentes/' + idCorridaAtiva).update({ 
            status: "A caminho", 
            motoristaId: motoristaId, // Importante salvar o ID para recuperar depois
            motoristaNome: dadosMotorista.nome, 
            motoristaPlaca: dadosMotorista.placa 
        });
        document.getElementById('audioNotificacao').pause();
        mostrarTela('m-viagem');
    }

    function proximaEtapa() {
        etapaViagem = "levar";
        db.ref('corridas_pendentes/' + idCorridaAtiva).update({ status: "Em Viagem" });
        document.getElementById('titulo-viagem').innerText = "EM VIAGEM (PRETO)";
        document.getElementById('btn-proximo').style.display = "none";
        document.getElementById('btn-finalizar').style.display = "block";
        enviarPosicaoManual();
    }

    function finalizarCorrida() {
        db.ref('corridas_pendentes/' + idCorridaAtiva).update({ status: "Finalizada" }).then(() => {
            idCorridaAtiva = null;
            mostrarTela('m-status');
        });
    }

    function enviarPosicaoManual() {
        navigator.geolocation.getCurrentPosition(pos => atualizarLocalizacaoNoBanco(pos.coords.latitude, pos.coords.longitude));
    }

    function toggleOnline() {
        isOnline = !isOnline;
        document.getElementById('status-text').innerText = isOnline ? "ONLINE (VERDE)" : "OFFLINE (AMARELO)";
        document.getElementById('status-text').style.color = isOnline ? "green" : "orange";
        if(isOnline) ouvirCorridas();
        enviarPosicaoManual();
    }

    function ouvirCorridas() {
        db.ref('corridas_pendentes').on('value', snap => {
            if(!isOnline || idCorridaAtiva) return;
            snap.forEach(c => {
                if(c.val().status === "pendente") {
                    idCorridaAtiva = c.key;
                    currentDestino = c.val().partida;
                    document.getElementById('detalhes-chamada').innerText = "Buscar em: " + currentDestino;
                    document.getElementById('audioNotificacao').play();
                    mostrarTela('m-chamada');
                }
            });
        });
    }

    function abrirGPS() {
        window.open(`https://www.google.com/maps/search/?api=1&query=${currentDestino}`);
    }

    function sairApp() {
        if(confirm("Deseja deslogar?")) {
            navigator.geolocation.clearWatch(watchID);
            db.ref('localizacao_motoristas/' + motoristaId).remove().then(() => location.reload());
        }
    }

    function acaoCadastroMotorista() {
        const dados = {
            nome: document.getElementById('c-nome').value,
            email: document.getElementById('c-email').value,
            telefone: document.getElementById('c-tel').value,
            cpf: document.getElementById('c-cpf').value,
            modelo: document.getElementById('c-veiculo').value,
            placa: document.getElementById('c-placa').value,
            senha: document.getElementById('c-senha').value,
            status: "ativo", nota: 5.0
        };
        db.ref('motoristas').push(dados).then(() => { alert("Cadastro Ok!"); mostrarTela('m-login'); });
    }
    </script>
</body>
</html>
