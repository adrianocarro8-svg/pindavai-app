<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAÍ - Passageiro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pindavai: #ffcc00; --dark: #1a1a1a; --danger: #dc3545; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; height: 100%; background: #f4f4f4; overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; }
        .active { display: flex; }
        .auth-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; background: white; }
        .auth-card { width: 100%; max-width: 350px; text-align: center; }
        input, select { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; background: white; }
        .btn { background: var(--pindavai); border: none; padding: 16px; width: 100%; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        
        /* NOVO: Estilo para o Box de Valor */
        .box-valor { background: #fff9db; color: #856404; padding: 12px; border-radius: 10px; margin: 10px 0; font-weight: bold; text-align: center; border: 1px dashed #ffeeba; display: none; }

        .btn-link { color: #1a73e8; background: none; border: none; margin-top: 15px; cursor: pointer; font-weight: bold; }
        #map { flex: 1; width: 100%; }
        .panel-request { background: white; padding: 20px; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); position: relative; z-index: 1000; }
        #status-monitor { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 25px; border-radius: 25px 25px 0 0; z-index: 2000; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); text-align: center; }
        .info-motorista { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-top: 15px; display: none; text-align: left; border: 1px solid #eee; }
        .btn-cancelar { background: #fce8e8; color: var(--danger); border: 2px solid var(--danger); margin-top: 15px; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer;}
    </style>
</head>
<body>
    <div id="p-login" class="screen active">
        <div class="auth-container">
            <div class="auth-card">
                <h1>PINDAVAÍ</h1>
                <input type="email" id="l-email" placeholder="E-mail">
                <input type="password" id="l-senha" placeholder="Senha">
                <button class="btn" onclick="fazerLogin()">ENTRAR</button>
                <button class="btn-link" onclick="mostrarTela('p-cadastro')">Criar conta</button>
            </div>
        </div>
    </div>

    <div id="p-cadastro" class="screen">
        <div class="auth-container">
            <div class="auth-card">
                <h3>Cadastro</h3>
                <input type="text" id="c-nome" placeholder="Nome Completo">
                <input type="email" id="c-email" placeholder="E-mail">
                <input type="tel" id="c-tel" placeholder="WhatsApp">
                <input type="text" id="c-cpf" placeholder="CPF">
                <input type="password" id="c-senha" placeholder="Senha">
                <button class="btn" onclick="acaoCadastroPassageiro()">FINALIZAR</button>
                <button class="btn-link" onclick="mostrarTela('p-login')">Voltar</button>
            </div>
        </div>
    </div>

    <div id="p-app" class="screen">
        <div id="map"></div>
        <div class="panel-request" id="painel-pedido">
            <input type="text" id="partida" placeholder="📍 Local de Embarque">
            <input type="text" id="parada" placeholder="🛑 Parada (opcional)">
            <input type="text" id="destino" placeholder="🏁 Destino Final" onchange="estimarPreco()">
            
            <label style="display:block; text-align:left; margin-left:5px; font-weight:bold; font-size:14px;">Forma de Pagamento:</label>
            <select id="pagamento">
                <option value="Dinheiro">💵 Dinheiro</option>
                <option value="PIX">💎 PIX</option>
                <option value="Cartão">💳 Cartão (Maquininha)</option>
            </select>

            <div id="box-valor" class="box-valor">
                Valor Estimado: <span id="txt-preco">Calculando...</span>
            </div>

            <button class="btn" onclick="solicitarViagem()">CHAMAR PINDAVAÍ</button>
        </div>

        <div id="status-monitor">
            <h3 id="status-msg">🔍 Procurando motorista...</h3>
            <div id="info-motorista-box" class="info-motorista">
                <p><b>Motorista:</b> <span id="txt-nome-mot">---</span></p>
                <p><b>Placa:</b> <span id="txt-placa-mot" style="background:#333; color:#fff; padding:2px 6px; border-radius:4px;">---</span></p>
                <p><b>Valor da Viagem:</b> <span id="txt-valor-mot">---</span></p>
            </div>
            <button id="btn-cancelar-corrida" class="btn-cancelar" onclick="cancelarCorrida()">CANCELAR CORRIDA</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let map, currentUser, markers = {}, idCorridaAtual = null, tarifas = {};

        // 1. CARREGA TARIFAS DA CENTRAL MASTER
        db.ref('configuracoes/tarifas').on('value', snap => {
            tarifas = snap.val();
        });

        function mostrarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // 2. FUNÇÃO DE CÁLCULO INTEGRADA (RESPEITANDO AS FAIXAS)
        function estimarPreco() {
            if (!tarifas) return;
            
            let kmDistancia = 55; // Simulando KM (integração futura com rota)
            let tempoMinutos = 15;

            let vBase = parseFloat(tarifas.base) || 0;
            let vMin = parseFloat(tarifas.minuto) || 0;
            let vKm = parseFloat(tarifas.km) || 0;

            // Lógica de faixas de longa distância
            if (kmDistancia >= 150) vKm = parseFloat(tarifas.km_100_a_500) || vKm;
            else if (kmDistancia >= 100) vKm = parseFloat(tarifas.km_50_a_100) || vKm;
            else if (kmDistancia >= 50) vKm = parseFloat(tarifas.km_ate_50) || vKm;

            let total = vBase + (kmDistancia * vKm) + (tempoMinutos * vMin);
            
            document.getElementById('box-valor').style.display = "block";
            document.getElementById('txt-preco').innerText = total.toLocaleString('pt-br',{style: 'currency', currency: 'BRL'});
            return total.toLocaleString('pt-br',{style: 'currency', currency: 'BRL'});
        }

        function fazerLogin() {
            const email = document.getElementById('l-email').value;
            const senha = document.getElementById('l-senha').value;
            db.ref('passageiros').orderByChild('email').equalTo(email).once('value', snap => {
                if(snap.exists()){
                    let id = Object.keys(snap.val())[0];
                    let user = snap.val()[id];
                    if(user.senha === senha) {
                        currentUser = user; currentUser.id = id;
                        mostrarTela('p-app');
                        initMap();
                        verificarCorridaAtivaAoLogar();
                    } else alert("Senha incorreta");
                } else alert("Usuário não encontrado");
            });
        }

        function initMap() {
            if(map) return;
            map = L.map('map').setView([-22.9255, -45.4548], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            db.ref('localizacao_motoristas').on('value', snap => {
                const motos = snap.val();
                for(let id in markers) { if(!motos || !motos[id]) { map.removeLayer(markers[id]); delete markers[id]; } }
                for(let id in motos) {
                    const m = motos[id];
                    let cor = (m.status === "disponivel") ? "#28a745" : (m.status === "a_caminho") ? "#dc3545" : (m.status === "em_viagem") ? "#000" : "#ffcc00";
                    if(markers[id]) { markers[id].setLatLng([m.lat, m.lng]); }
                    else {
                        const icon = L.divIcon({ html: `<i class="fas fa-car" style="color:${cor}; font-size:20px;"></i>`, className: 'dummy' });
                        markers[id] = L.marker([m.lat, m.lng], {icon}).addTo(map);
                    }
                }
            });
        }

        function verificarCorridaAtivaAoLogar() {
            db.ref('corridas_pendentes').once('value', snap => {
                snap.forEach(c => {
                    const dados = c.val();
                    if(dados.passageiroId === currentUser.id && dados.status !== "Finalizada" && dados.status !== "Cancelada") {
                        idCorridaAtual = c.key;
                        document.getElementById('painel-pedido').style.display = "none";
                        document.getElementById('status-monitor').style.display = "block";
                        monitorarCorrida();
                    }
                });
            });
        }

        function solicitarViagem() {
            const novaCorrida = {
                passageiroId: currentUser.id, 
                passageiroNome: currentUser.nome,
                partida: document.getElementById('partida').value,
                parada: document.getElementById('parada').value || "Sem parada",
                destino: document.getElementById('destino').value,
                pagamento: document.getElementById('pagamento').value,
                valorEstimado: document.getElementById('txt-preco').innerText,
                status: "pendente",
                timestamp: Date.now() // NOVO: Para regra dos 3 min
            };
            if(!novaCorrida.partida || !novaCorrida.destino) return alert("Preencha origem e destino!");

            const ref = db.ref('corridas_pendentes').push(novaCorrida);
            idCorridaAtual = ref.key;
            document.getElementById('painel-pedido').style.display = "none";
            document.getElementById('status-monitor').style.display = "block";
            monitorarCorrida();
        }

        function monitorarCorrida() {
            db.ref('corridas_pendentes/' + idCorridaAtual).on('value', snap => {
                const c = snap.val();
                if(!c) return;
                if(c.status === "Cancelada") { location.reload(); return; }
                const msg = document.getElementById('status-msg');
                if(c.status === "A caminho") {
                    msg.innerText = "MOTORISTA A CAMINHO!";
                    document.getElementById('info-motorista-box').style.display = "block";
                    document.getElementById('txt-nome-mot').innerText = c.motoristaNome;
                    document.getElementById('txt-placa-mot').innerText = c.motoristaPlaca;
                    document.getElementById('txt-valor-mot').innerText = c.valorEstimado;
                } else if(c.status === "Em Viagem") {
                    msg.innerText = "VOCÊ ESTÁ EM VIAGEM";
                } else if(c.status === "Finalizada") { 
                    alert("Viagem Concluída!"); 
                    location.reload(); 
                }
            });
        }

        function cancelarCorrida() {
            db.ref('corridas_pendentes/' + idCorridaAtual).once('value', snap => {
                const d = snap.val();
                const agora = Date.now();
                const diff = (agora - d.timestamp) / 1000 / 60; // diff em minutos

                let aviso = "Deseja cancelar?";
                if(diff > 3) aviso = `Já se passaram 3 min. Será cobrada taxa de ${parseFloat(tarifas.cancelamento).toLocaleString('pt-br',{style:'currency', currency:'BRL'})}. Confirmar?`;

                if(confirm(aviso)) {
                    db.ref('corridas_pendentes/' + idCorridaAtual).update({ 
                        status: "Cancelada",
                        taxaAplicada: diff > 3 ? tarifas.cancelamento : 0
                    }).then(() => location.reload());
                }
            });
        }

        function acaoCadastroPassageiro() {
            const dados = {
                nome: document.getElementById('c-nome').value,
                email: document.getElementById('c-email').value,
                telefone: document.getElementById('c-tel').value,
                cpf: document.getElementById('c-cpf').value,
                senha: document.getElementById('c-senha').value,
                status: "ativo", nota: 5.0
            };
            db.ref('passageiros').push(dados).then(() => { alert("Cadastrado!"); mostrarTela('p-login'); });
        }
    </script>
</body>
</html>
