<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAÍ - PASSAGEIRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ffcc00; --dark: #1a1a1a; --bg: #f0f2f5; --blue: #4285F4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        .card { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        #map { width: 100%; height: 160px; border-radius: 15px; margin-bottom: 10px; background: #ddd; }
        
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn-yellow { background: var(--primary); color: var(--dark); }
        
        /* Opções de Pagamento */
        .pay-methods { display: flex; justify-content: space-between; gap: 8px; margin: 15px 0; }
        .pay-btn { flex: 1; border: 2px solid #eee; border-radius: 10px; padding: 10px 5px; cursor: pointer; text-align: center; font-size: 11px; font-weight: bold; transition: 0.3s; background: #fff; }
        .pay-btn i { display: block; font-size: 20px; margin-bottom: 5px; }
        .pay-btn.selected { border-color: var(--primary); background: #fffdf0; }

        .price-tag { background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 12px; margin: 10px 0; display: none; text-align: center; }
        .add-parada { color: var(--blue); font-size: 13px; cursor: pointer; font-weight: bold; margin: 8px 0; display: block; }
        .parada-item { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
        .parada-item button { background: #ff4444; color: white; border: none; border-radius: 8px; padding: 10px; }
    </style>
</head>
<body onload="initApp()">

    <div id="p-login" class="screen active">
        <div class="card">
            <h1 style="text-align:center">PINDAVAÍ</h1>
            <input type="email" id="l-email" placeholder="E-mail">
            <input type="password" id="l-senha" placeholder="Senha">
            <button class="btn btn-yellow" onclick="fazerLogin()">ENTRAR</button>
            <button class="btn" style="background:none; color:var(--blue)" onclick="mostrarTela('p-cadastro')">Criar Conta</button>
        </div>
    </div>

    <div id="p-cadastro" class="screen">
        <div class="card">
            <h3>Cadastro</h3>
            <input type="text" id="c-nome" placeholder="Nome Completo">
            <input type="email" id="c-email" placeholder="E-mail">
            <input type="password" id="c-senha" placeholder="Senha">
            <button class="btn btn-yellow" onclick="acaoCadastrar()">CADASTRAR</button>
            <button class="btn" style="background:none;" onclick="mostrarTela('p-login')">Voltar</button>
        </div>
    </div>

    <div id="p-main" class="screen">
        <div class="card">
            <div id="map"></div>
            
            <input type="text" id="input-partida" placeholder="Onde você está?">
            <div id="lista-paradas"></div>
            <span class="add-parada" onclick="addParadaInput()">+ ADICIONAR PARADA</span>
            <input type="text" id="input-destino" placeholder="Para onde vamos?" onblur="calcularValor()">

            <label style="font-size: 12px; font-weight: bold; margin-top: 10px; display: block;">FORMA DE PAGAMENTO:</label>
            <div class="pay-methods">
                <div class="pay-btn" id="pay-dinheiro" onclick="selecionarPagamento('Dinheiro', this)">
                    <i class="fas fa-money-bill-wave" style="color: #28a745;"></i> DINHEIRO
                </div>
                <div class="pay-btn" id="pay-pix" onclick="selecionarPagamento('PIX', this)">
                    <i class="fab fa-pix" style="color: #32bcad;"></i> PIX
                </div>
                <div class="pay-btn" id="pay-cartao" onclick="selecionarPagamento('Cartão', this)">
                    <i class="fas fa-credit-card" style="color: #blue;"></i> CARTÃO
                </div>
            </div>

            <div id="price-box" class="price-tag">
                <small>Valor Estimado:</small>
                <div id="txt-preco" style="font-size: 24px; font-weight: bold;">R$ 0,00</div>
            </div>
            
            <button class="btn btn-yellow" onclick="pedirCorrida()">SOLICITAR VIAGEM</button>
        </div>
    </div>

    <div id="p-espera" class="screen" style="background:rgba(0,0,0,0.8)">
        <div class="card">
            <h2 id="status-txt" style="text-align:center">Buscando...</h2>
            <div id="motorista-box" style="display:none; text-align: center;">
                <i class="fas fa-car fa-3x" style="color: var(--primary)"></i><br><br>
                <b id="m-nome" style="font-size: 20px;"></b><br>
                <span id="m-veiculo"></span>
            </div>
            <button id="btn-cancelar" class="btn btn-red" onclick="cancelarCorrida()" style="margin-top: 20px;">CANCELAR</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, userPos, usuarioLogado = null, idCorrida = null, formaPagamento = "", valorGlobal = 0;

        function initApp() {
            map = L.map('map', {zoomControl: false}).setView([-22.9255, -45.4548], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        function mostrarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'p-main') setTimeout(() => map.invalidateSize(), 300);
        }

        function selecionarPagamento(metodo, elemento) {
            formaPagamento = metodo;
            document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('selected'));
            elemento.classList.add('selected');
            calcularValor(); // Recalcula se mudar o pagamento
        }

        function addParadaInput() {
            const div = document.createElement('div');
            div.className = 'parada-item';
            div.innerHTML = `<input type="text" class="p-extra" placeholder="Endereço Parada" onblur="calcularValor()"> <button onclick="this.parentElement.remove(); calcularValor()">×</button>`;
            document.getElementById('lista-paradas').appendChild(div);
        }

        function calcularValor() {
            const destino = document.getElementById('input-destino').value;
            if(!destino) return;

            // Lógica Simples de Cálculo: Base 10.00 + 5.00 por parada
            let paradas = document.querySelectorAll('.p-extra').length;
            let total = 12.00 + (paradas * 5.00); 
            
            valorGlobal = "R$ " + total.toFixed(2);
            document.getElementById('txt-preco').innerText = valorGlobal;
            document.getElementById('price-box').style.display = "block";
        }

        function pedirCorrida() {
            const partida = document.getElementById('input-partida').value;
            const destino = document.getElementById('input-destino').value;
            if(!partida || !destino) return alert("Preencha os endereços!");
            if(!formaPagamento) return alert("Selecione a forma de pagamento!");

            let extras = [];
            document.querySelectorAll('.p-extra').forEach(i => { if(i.value) extras.push(i.value); });

            const pedido = {
                nome: usuarioLogado.nome,
                partida: partida,
                paradas: extras,
                destino: destino,
                pagamento: formaPagamento, // DINHEIRO, PIX ou CARTÃO
                valor: valorGlobal,
                status: "pendente",
                timestamp: Date.now()
            };

            const ref = db.ref('corridas_pendentes').push();
            idCorrida = ref.key;
            ref.set(pedido).then(() => {
                mostrarTela('p-espera');
                ouvirStatus();
            });
        }

        // Funções de Login e Cadastro (Mantidas do código anterior)
        function fazerLogin() {
            const e = document.getElementById('l-email').value;
            const s = document.getElementById('l-senha').value;
            db.ref('passageiros').orderByChild('email').equalTo(e).once('value', snap => {
                if(snap.exists()){
                    const id = Object.keys(snap.val())[0];
                    const u = snap.val()[id];
                    if(u.senha === s) { usuarioLogado = u; mostrarTela('p-main'); }
                    else alert("Senha incorreta");
                }
            });
        }

        function acaoCadastrar() {
            const d = { nome: document.getElementById('c-nome').value, email: document.getElementById('c-email').value, senha: document.getElementById('c-senha').value, status: "ativo" };
            db.ref('passageiros').push(d).then(() => mostrarTela('p-login'));
        }

        function ouvirStatus() {
            db.ref('corridas_pendentes/'+idCorrida).on('value', snap => {
                const c = snap.val();
                if(!c) return;
                if(c.status === "A caminho") {
                    document.getElementById('status-txt').innerText = "Motorista Confirmado!";
                    document.getElementById('motorista-box').style.display = "block";
                    document.getElementById('m-nome').innerText = c.motoristaNome;
                    document.getElementById('m-veiculo').innerText = c.motoristaPlaca;
                }
                if(c.status === "Em Viagem") document.getElementById('btn-cancelar').style.display = "none";
                if(c.status === "Finalizada") { alert("Viagem Concluída!"); location.reload(); }
            });
        }

        function cancelarCorrida() {
            if(confirm("Cancelar viagem?")) db.ref('corridas_pendentes/'+idCorrida).remove().then(() => location.reload());
        }
    </script>
</body>
</html>
