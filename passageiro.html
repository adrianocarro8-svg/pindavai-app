<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAÍ - PASSAGEIRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ffcc00; --dark: #1a1a1a; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; width: 100vw; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        .card { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        #map { width: 100%; height: 180px; border-radius: 15px; margin-bottom: 15px; background: #ddd; z-index: 1; }
        
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn-yellow { background: var(--primary); color: var(--dark); }
        .btn-red { background: #ff4444; color: white; }
        
        .add-parada { color: #4285F4; font-size: 13px; cursor: pointer; font-weight: bold; margin: 8px 0; display: block; text-align: left; }
        .parada-item { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
        .parada-item input { margin: 0; }
        .parada-item button { background: #ff4444; color: white; border: none; border-radius: 8px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body onload="initApp()">

    <div id="p-login" class="screen active">
        <div class="card">
            <h1 style="text-align:center">PINDAVAÍ</h1>
            <input type="email" id="l-email" placeholder="E-mail">
            <input type="password" id="l-senha" placeholder="Senha">
            <button class="btn btn-yellow" onclick="fazerLogin()">ENTRAR</button>
            <button class="btn" style="background:none; color:#4285F4" onclick="mostrarTela('p-cadastro')">Criar Conta Passageiro</button>
        </div>
    </div>

    <div id="p-cadastro" class="screen">
        <div class="card">
            <h3>Cadastro Passageiro</h3>
            <div style="max-height: 350px; overflow-y: auto;">
                <input type="text" id="c-nome" placeholder="Nome Completo">
                <input type="email" id="c-email" placeholder="E-mail">
                <input type="tel" id="c-tel" placeholder="WhatsApp">
                <input type="text" id="c-cpf" placeholder="CPF">
                <input type="password" id="c-senha" placeholder="Crie uma Senha">
            </div>
            <button class="btn btn-yellow" onclick="acaoCadastrar()">CADASTRAR AGORA</button>
            <button class="btn" style="background:none;" onclick="mostrarTela('p-login')">Voltar</button>
        </div>
    </div>

    <div id="p-main" class="screen">
        <div class="card">
            <div id="map"></div>
            
            <label style="font-size: 12px; font-weight: bold;">ORIGEM:</label>
            <input type="text" id="input-partida" placeholder="Onde você está?">
            
            <div id="lista-paradas"></div>
            <span class="add-parada" onclick="addParadaInput()">+ ADICIONAR PARADA</span>
            
            <label style="font-size: 12px; font-weight: bold;">DESTINO FINAL:</label>
            <input type="text" id="input-destino" placeholder="Para onde vamos?">
            
            <button class="btn btn-yellow" onclick="pedirCorrida()">SOLICITAR PINDAVAÍ</button>
        </div>
    </div>

    <div id="p-espera" class="screen" style="background:rgba(0,0,0,0.8)">
        <div class="card">
            <h2 id="status-txt" style="text-align:center">Buscando...</h2>
            <div id="motorista-box" style="background:#f9f9f9; padding:15px; border-radius:10px; margin:10px 0; display:none;">
                <b id="m-nome">Motorista</b><br>
                <span id="m-veiculo">Carro</span>
            </div>
            <p id="info-rota" style="font-size:14px; color:#666;"></p>
            
            <button id="btn-cancelar" class="btn btn-red" onclick="cancelarCorrida()">CANCELAR VIAGEM</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, userPos, usuarioLogado = null, idCorrida = null;

        function initApp() {
            map = L.map('map', {zoomControl: false}).setView([-22.9255, -45.4548], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            navigator.geolocation.getCurrentPosition(p => {
                userPos = [p.coords.latitude, p.coords.longitude];
                map.setView(userPos, 15);
                L.marker(userPos).addTo(map);
            });
        }

        function mostrarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'p-main') setTimeout(() => map.invalidateSize(), 300);
        }

        function fazerLogin() {
            const e = document.getElementById('l-email').value;
            const s = document.getElementById('l-senha').value;
            db.ref('passageiros').orderByChild('email').equalTo(e).once('value', snap => {
                if(snap.exists()){
                    const id = Object.keys(snap.val())[0];
                    const u = snap.val()[id];
                    if(u.senha === s) { usuarioLogado = u; mostrarTela('p-main'); }
                    else alert("Senha incorreta");
                } else alert("Usuário não cadastrado");
            });
        }

        function acaoCadastrar() {
            const d = {
                nome: document.getElementById('c-nome').value,
                email: document.getElementById('c-email').value,
                telefone: document.getElementById('c-tel').value,
                cpf: document.getElementById('c-cpf').value,
                senha: document.getElementById('c-senha').value,
                status: "ativo"
            };
            if(!d.nome || !d.email) return alert("Preencha Nome e E-mail!");
            db.ref('passageiros').push(d).then(() => { alert("Cadastro realizado!"); mostrarTela('p-login'); });
        }

        function addParadaInput() {
            const container = document.getElementById('lista-paradas');
            const div = document.createElement('div');
            div.className = 'parada-item';
            div.innerHTML = `<input type="text" class="p-extra" placeholder="Endereço da Parada"> <button onclick="this.parentElement.remove()">×</button>`;
            container.appendChild(div);
        }

        function pedirCorrida() {
            const partida = document.getElementById('input-partida').value;
            const destino = document.getElementById('input-destino').value;
            let paradas = [];
            document.querySelectorAll('.p-extra').forEach(i => { if(i.value) paradas.push(i.value); });

            if(!partida || !destino) return alert("Preencha Origem e Destino!");

            const pedido = {
                nome: usuarioLogado.nome,
                partida: partida,
                paradas: paradas, // Envia o array de paradas
                destino: destino,
                status: "pendente",
                valor: "R$ " + (12 + (paradas.length * 5)).toFixed(2), // Adiciona R$5 por parada
                timestamp: Date.now()
            };

            const ref = db.ref('corridas_pendentes').push();
            idCorrida = ref.key;
            ref.set(pedido).then(() => {
                mostrarTela('p-espera');
                ouvirStatus();
            });
        }

        function ouvirStatus() {
            db.ref('corridas_pendentes/'+idCorrida).on('value', snap => {
                const c = snap.val();
                if(!c) return;

                const btnCancel = document.getElementById('btn-cancelar');

                if(c.status === "A caminho") {
                    document.getElementById('status-txt').innerText = "Motorista Confirmado!";
                    document.getElementById('motorista-box').style.display = "block";
                    document.getElementById('m-nome').innerText = c.motoristaNome;
                    document.getElementById('m-veiculo').innerText = c.motoristaPlaca;
                    document.getElementById('info-rota').innerText = "Vindo buscar em: " + c.partida;
                    btnCancel.style.display = "block"; // Pode cancelar enquanto ele não chegou
                } 
                
                else if(c.status === "Em Viagem") {
                    document.getElementById('status-txt').innerText = "Em Viagem...";
                    btnCancel.style.display = "none"; // SUMIR BOTÃO CANCELAR AO ENTRAR NO CARRO
                    
                    // Mostra para onde está indo agora (Parada ou Destino)
                    let destinoAtual = c.destino;
                    if(c.paradas && c.paradas.length > 0) {
                        destinoAtual = "Indo para Parada: " + c.paradas[0];
                    }
                    document.getElementById('info-rota').innerText = destinoAtual;
                }

                else if(c.status === "Finalizada") {
                    alert("Viagem Finalizada com Sucesso!");
                    location.reload();
                }
            });
        }

        function cancelarCorrida() {
            if(confirm("Deseja realmente cancelar?")) {
                db.ref('corridas_pendentes/'+idCorrida).remove().then(() => location.reload());
            }
        }
    </script>
</body>
</html>
