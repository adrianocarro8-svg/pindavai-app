<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINDAVAI - Passageiro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; }
        .active { display: flex; }
        #map { flex: 1; width: 100%; }
        .panel { background: white; padding: 20px; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        input { width:100%; padding:10px; margin:5px 0; box-sizing:border-box; border-radius:8px; border:1px solid #ccc; }
        .btn { background: #ffcc00; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 10px; cursor: pointer; }
        .car-icon { font-size: 24px; transition: all 0.5s linear; }
    </style>
</head>
<body>

    <div id="sc-login" class="screen active" style="justify-content:center; align-items:center; background:#eee;">
        <div style="background:white; padding:30px; border-radius:20px; text-align:center; width:80%;">
            <h1>PINDAVAÍ</h1>
            <input type="email" id="p-email" placeholder="E-mail">
            <input type="password" id="p-senha" placeholder="Senha">
            <button class="btn" onclick="login()">ENTRAR</button>
            <p onclick="mostrarTela('sc-cadastro')" style="color:blue; cursor:pointer; margin-top:15px;">Criar nova conta</p>
        </div>
    </div>

    <div id="sc-cadastro" class="screen" style="justify-content:center; align-items:center; background:#eee;">
        <div style="background:white; padding:30px; border-radius:20px; text-align:center; width:80%;">
            <h3>Cadastro Passageiro</h3>
            <input type="text" id="cad-nome" placeholder="Nome Completo">
            <input type="email" id="cad-email" placeholder="E-mail">
            <input type="password" id="cad-senha" placeholder="Senha">
            <button class="btn" onclick="cadastrarPassageiro()">CADASTRAR</button>
            <p onclick="mostrarTela('sc-login')" style="cursor:pointer; margin-top:15px;">Voltar</p>
        </div>
    </div>

    <div id="sc-app" class="screen">
        <div id="map"></div>
        <div class="panel">
            <input type="text" id="partida" placeholder="Local de partida">
            <input type="text" id="destino" placeholder="Destino final">
            <button class="btn" onclick="pedir()">PEDIR VIAGEM</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, currentUser, markers = {};

        function mostrarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function cadastrarPassageiro() {
            const nome = document.getElementById('cad-nome').value;
            const email = document.getElementById('cad-email').value;
            const senha = document.getElementById('cad-senha').value;
            db.ref('passageiros').push({ nome, email, senha, status: 'ativo', nota: 5.0 }).then(() => {
                alert("Conta criada!"); mostrarTela('sc-login');
            });
        }

        function login() {
            const email = document.getElementById('p-email').value;
            const senha = document.getElementById('p-senha').value;
            db.ref('passageiros').orderByChild('email').equalTo(email).once('value', snap => {
                if(snap.exists()){
                    let id = Object.keys(snap.val())[0];
                    let user = snap.val()[id];
                    if(user.senha === senha) {
                        currentUser = user;
                        mostrarTela('sc-app');
                        initMap();
                    } else alert("Senha errada");
                }
            });
        }

        function initMap() {
            map = L.map('map').setView([-22.9255, -45.4548], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            db.ref('localizacao_motoristas').on('value', snap => {
                const motoristas = snap.val();
                for(let id in markers) { if(!motoristas || !motoristas[id]) { map.removeLayer(markers[id]); delete markers[id]; } }
                for(let id in motoristas) {
                    const m = motoristas[id];
                    let cor = "#ffcc00"; // Amarelo
                    if(m.status === "disponivel") cor = "#28a745"; // Verde
                    if(m.status === "a_caminho") cor = "#dc3545"; // Vermelho
                    if(m.status === "em_viagem") cor = "#000000"; // Preto

                    if(markers[id]) {
                        markers[id].setLatLng([m.lat, m.lng]);
                        markers[id].getElement().querySelector('i').style.color = cor;
                    } else {
                        const icon = L.divIcon({
                            html: `<i class="fas fa-car car-icon" style="color:${cor}"></i>`,
                            className: 'dummy', iconSize:[30,30]
                        });
                        markers[id] = L.marker([m.lat, m.lng], {icon}).addTo(map);
                    }
                }
            });
        }

        function pedir() {
            db.ref('corridas_pendentes').push({
                passageiroNome: currentUser.nome,
                partida: document.getElementById('partida').value,
                destino: document.getElementById('destino').value,
                status: "pendente"
            });
            alert("Chamada enviada!");
        }
    </script>
</body>
</html>
