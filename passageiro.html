<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAI - Passageiro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <style>
        :root { --pindavai: #ffcc00; --dark: #1a1a1a; --gray: #f4f4f4; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100%; overflow: hidden; background: var(--gray); }

        /* Telas */
        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }

        /* Estilo Formulários */
        .auth-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 32px; font-weight: bold; margin-bottom: 20px; color: var(--dark); }
        .logo span { color: var(--pindavai); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-main { background: var(--pindavai); color: #000; }
        .btn-link { background: none; color: var(--primary); font-size: 14px; margin-top: 10px; }

        /* Tela do Mapa */
        #map { flex: 1; width: 100%; }
        .map-panel { height: 280px; background: white; width: 100%; border-radius: 25px 25px 0 0; position: relative; top: -25px; padding: 20px; box-sizing: border-box; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; }
        .price-tag { font-size: 24px; font-weight: bold; text-align: center; margin: 15px 0; display: block; }
        
        /* Foto de Perfil */
        .profile-img-preview { width: 80px; height: 80px; border-radius: 50%; background: #eee; margin: 10px auto; object-fit: cover; border: 2px solid var(--pindavai); }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <div class="auth-card">
            <div class="logo">PINDA<span>VAÍ</span></div>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-senha" placeholder="Senha">
            <button class="btn-main" onclick="acaoLogin()">ENTRAR</button>
            <button class="btn-link" onclick="navegar('screen-cadastro')">Criar nova conta</button>
        </div>
    </div>

    <div id="screen-cadastro" class="screen">
        <div class="auth-card">
            <h3>Crie sua conta</h3>
            <img id="preview" class="profile-img-preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <input type="text" id="cad-nome" placeholder="Nome Completo">
            <input type="text" id="cad-cpf" placeholder="CPF">
            <input type="email" id="cad-email" placeholder="E-mail">
            <input type="password" id="cad-senha" placeholder="Senha">
            <button class="btn-main" onclick="acaoCadastro()">CADASTRAR AGORA</button>
            <button class="btn-link" onclick="navegar('screen-login')">Voltar ao Login</button>
        </div>
    </div>

    <div id="screen-app" class="screen" style="padding:0;">
        <div id="map"></div>
        <div class="map-panel">
            <input type="text" id="inp-origem" placeholder="Sua localização" readonly>
            <input type="text" id="inp-destino" placeholder="Para onde você vai?">
            <div class="price-tag" id="display-preco">R$ 0,00</div>
            <button class="btn-main" onclick="pedirCorrida()">SOLICITAR PINDAVAÍ</button>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, routingControl, userPos = null;
        let valorCalculado = 0;

        // --- NAVEGAÇÃO ENTRE TELAS ---
        function navegar(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if(screenId === 'screen-app') initMap();
        }

        // --- LÓGICA DE LOGIN ---
        function acaoLogin() {
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;

            db.ref('passageiros').orderByChild('email').equalTo(email).once('value', snap => {
                if (snap.exists()) {
                    const id = Object.keys(snap.val())[0];
                    const user = snap.val()[id];

                    if (user.senha === senha) {
                        if (user.status === "bloqueado") {
                            alert("Sua conta está BLOQUEADA pela Central. Motivo: Avaliação baixa ou restrição administrativa.");
                        } else {
                            localStorage.setItem('pindavai_user', JSON.stringify({id, ...user}));
                            navegar('screen-app');
                        }
                    } else { alert("Senha incorreta!"); }
                } else { alert("Usuário não encontrado. Faça o cadastro!"); }
            });
        }

        // --- LÓGICA DE CADASTRO ---
        function acaoCadastro() {
            const dados = {
                nome: document.getElementById('cad-nome').value,
                cpf: document.getElementById('cad-cpf').value,
                email: document.getElementById('cad-email').value,
                senha: document.getElementById('cad-senha').value,
                status: "ativo",
                nota: 5.0,
                foto: "https://cdn-icons-png.flaticon.com/512/149/149071.png"
            };

            if(!dados.nome || !dados.email || !dados.senha) return alert("Preencha os campos obrigatórios!");

            db.ref('passageiros').push(dados).then(() => {
                alert("Cadastro realizado com sucesso!");
                navegar('screen-login');
            });
        }

        // --- MAPA E CÁLCULOS ---
        function initMap() {
            if(map) return;
            map = L.map('map').setView([-22.9255, -45.4548], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            navigator.geolocation.getCurrentPosition(p => {
                userPos = [p.coords.latitude, p.coords.longitude];
                map.setView(userPos, 15);
                L.marker(userPos).addTo(map).bindPopup("Você").openPopup();
                document.getElementById('inp-origem').value = "Minha Localização";
            });
        }

        // Simulação de Destino (Para testar o preço)
        document.getElementById('inp-destino').addEventListener('change', function() {
            // Simulação: Ao digitar algo, traça uma rota fixa para teste de 12km ou 60km
            // Em produção, você usa Geocoding aqui.
            const coordsDestino = [-22.9500, -45.5000]; 
            tracarRota(userPos, coordsDestino);
        });

        async function tracarRota(start, end) {
            if(routingControl) map.removeControl(routingControl);

            routingControl = L.Routing.control({
                waypoints: [L.latLng(start), L.latLng(end)],
                routeWhileDragging: false,
                addWaypoints: false,
                lineOptions: { styles: [{ color: '#ffcc00', weight: 6 }] }
            }).on('routesfound', async function(e) {
                const r = e.routes[0];
                const dist = r.summary.totalDistance / 1000;
                const tempo = r.summary.totalTime / 60;
                
                valorCalculado = await calcularTarifaPindavai(dist, tempo);
                document.getElementById('display-preco').innerText = `R$ ${valorCalculado.toFixed(2)}`;
            }).addTo(map);
        }

        async function calcularTarifaPindavai(km, min) {
            const snap = await db.ref('configuracoes/tarifas').once('value');
            const t = snap.val();
            if(!t) return 0;

            let kmPrice = parseFloat(t.km); // Padrão cidade

            // Aplicação das Faixas de Longa Distância
            if (km > 100 && km <= 500) kmPrice = parseFloat(t.km_100_a_500);
            else if (km > 50 && km <= 100) kmPrice = parseFloat(t.km_50_a_100);
            else if (km > 15 && km <= 50) kmPrice = parseFloat(t.km_ate_50);

            const total = parseFloat(t.base) + (km * kmPrice) + (min * parseFloat(t.minuto));
            return total;
        }

        function pedirCorrida() {
            if(valorCalculado === 0) return alert("Defina um destino primeiro!");
            const user = JSON.parse(localStorage.getItem('pindavai_user'));
            
            db.ref('corridas').push({
                cliente_id: user.id,
                cliente_nome: user.nome,
                valor: valorCalculado.toFixed(2),
                status: "procurando",
                timestamp: Date.now()
            }).then(() => alert("Chamada enviada! Aguardando motorista..."));
        }
    </script>
</body>
</html>
