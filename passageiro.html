<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAÍ - Passageiro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --pindavai: #ffcc00; --dark: #1a1a1a; --danger: #dc3545; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; height: 100%; background: #f4f4f4; overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; }
        .active { display: flex; }
        
        /* Telas de Autenticação */
        .auth-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; background: white; }
        .auth-card { width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { background: var(--pindavai); border: none; padding: 16px; width: 100%; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-link { color: #1a73e8; background: none; border: none; margin-top: 15px; cursor: pointer; font-weight: bold; }

        /* Mapa e Painel */
        #map { flex: 1; width: 100%; }
        .panel-request { background: white; padding: 20px; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); position: relative; z-index: 1000; }
        
        /* Monitor de Corrida Ativa */
        #status-monitor { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 25px; border-radius: 25px 25px 0 0; z-index: 2000; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); text-align: center; }
        .info-motorista { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-top: 15px; display: none; text-align: left; border: 1px solid #eee; }
        .car-icon { font-size: 24px; transition: all 0.5s linear; }
        .btn-cancelar { background: #fce8e8; color: var(--danger); border: 2px solid var(--danger); margin-top: 15px; }
    </style>
</head>
<body>

    <div id="p-login" class="screen active">
        <div class="auth-container">
            <div class="auth-card">
                <h1 style="font-size: 40px; margin-bottom: 5px;">PINDAVAÍ</h1>
                <p style="color: #666; margin-bottom: 30px;">Passageiro</p>
                <input type="email" id="l-email" placeholder="Seu e-mail">
                <input type="password" id="l-senha" placeholder="Sua senha">
                <button class="btn" onclick="fazerLogin()">ENTRAR</button>
                <button class="btn-link" onclick="mostrarTela('p-cadastro')">Criar nova conta</button>
            </div>
        </div>
    </div>

    <div id="p-cadastro" class="screen">
        <div class="auth-container">
            <div class="auth-card">
                <h3>Cadastro de Passageiro</h3>
                <input type="text" id="c-nome" placeholder="Nome Completo">
                <input type="email" id="c-email" placeholder="E-mail">
                <input type="tel" id="c-tel" placeholder="WhatsApp (DDD)">
                <input type="text" id="c-cpf" placeholder="CPF">
                <input type="password" id="c-senha" placeholder="Crie uma senha">
                <button class="btn" onclick="acaoCadastroPassageiro()">FINALIZAR CADASTRO</button>
                <button class="btn-link" onclick="mostrarTela('p-login')">Voltar ao Login</button>
            </div>
        </div>
    </div>

    <div id="p-app" class="screen">
        <div id="map"></div>
        
        <div class="panel-request" id="painel-pedido">
            <input type="text" id="partida" placeholder="📍 Local de embarque">
            <input type="text" id="parada" placeholder="🛑 Parada (opcional)">
            <input type="text" id="destino" placeholder="🏁 Destino final">
            <button class="btn" onclick="solicitarViagem()">SOLICITAR AGORA</button>
        </div>

        <div id="status-monitor">
            <h3 id="status-msg" style="color: #f39c12;">🔍 Procurando motorista...</h3>
            
            <div id="info-motorista-box" class="info-motorista">
                <p style="margin: 5px 0;"><b>Motorista:</b> <span id="txt-nome-mot">---</span></p>
                <p style="margin: 5px 0;"><b>Veículo:</b> <span id="txt-veiculo-mot">---</span></p>
                <p style="margin: 5px 0;"><b>Placa:</b> <span id="txt-placa-mot" style="background:#333; color:#fff; padding:2px 6px; border-radius:4px;">---</span></p>
            </div>

            <button id="btn-cancelar-corrida" class="btn btn-cancelar" onclick="cancelarCorrida()">CANCELAR CORRIDA</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, currentUser, markers = {}, idCorridaAtual = null;

        function mostrarTela(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function acaoCadastroPassageiro() {
            const dados = {
                nome: document.getElementById('c-nome').value,
                email: document.getElementById('c-email').value,
                telefone: document.getElementById('c-tel').value,
                cpf: document.getElementById('c-cpf').value,
                senha: document.getElementById('c-senha').value,
                status: "ativo", nota: 5.0
            };
            if(!dados.nome || !dados.email || !dados.senha) return alert("Preencha todos os campos!");
            db.ref('passageiros').push(dados).then(() => {
                alert("Cadastro realizado com sucesso!");
                mostrarTela('p-login');
            });
        }

        function fazerLogin() {
            const email = document.getElementById('l-email').value;
            const senha = document.getElementById('l-senha').value;
            db.ref('passageiros').orderByChild('email').equalTo(email).once('value', snap => {
                if(snap.exists()){
                    let id = Object.keys(snap.val())[0];
                    let user = snap.val()[id];
                    if(user.senha === senha) {
                        if(user.status === "bloqueado") return alert("Conta bloqueada pela central.");
                        currentUser = user; currentUser.id = id;
                        mostrarTela('p-app');
                        initMap();
                        verificarCorridaAtivaAoLogar();
                    } else alert("Senha incorreta!");
                } else alert("E-mail não cadastrado!");
            });
        }

        function initMap() {
            if(map) return;
            map = L.map('map').setView([-22.9255, -45.4548], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            // Monitorar motoristas e as 4 cores
            db.ref('localizacao_motoristas').on('value', snap => {
                const motos = snap.val();
                for(let id in markers) { if(!motos || !motos[id]) { map.removeLayer(markers[id]); delete markers[id]; } }
                if(!motos) return;
                for(let id in motos) {
                    const m = motos[id];
                    let cor = "#ffcc00"; // Amarelo (Logado)
                    if(m.status === "disponivel") cor = "#28a745"; // Verde
                    if(m.status === "a_caminho") cor = "#dc3545"; // Vermelho
                    if(m.status === "em_viagem") cor = "#000000"; // Preto

                    if(markers[id]) {
                        markers[id].setLatLng([m.lat, m.lng]);
                        markers[id].getElement().querySelector('i').style.color = cor;
                    } else {
                        const icon = L.divIcon({
                            html: `<i class="fas fa-car car-icon" style="color:${cor}"></i>`,
                            className: 'dummy', iconSize:[30,30]
                        });
                        markers[id] = L.marker([m.lat, m.lng], {icon}).addTo(map);
                    }
                }
            });
        }

        function solicitarViagem() {
            const partida = document.getElementById('partida').value;
            const parada = document.getElementById('parada').value;
            const destino = document.getElementById('destino').value;

            if(!partida || !destino) return alert("Informe a origem e o destino!");

            const novaCorrida = {
                passageiroId: currentUser.id,
                passageiroNome: currentUser.nome,
                partida: partida,
                parada: parada || "Sem parada",
                destino: destino,
                status: "pendente",
                timestamp: Date.now()
            };

            const ref = db.ref('corridas_pendentes').push(novaCorrida);
            idCorridaAtual = ref.key;
            
            document.getElementById('painel-pedido').style.display = "none";
            document.getElementById('status-monitor').style.display = "block";
            monitorarCorrida();
        }

        // Recuperar corrida se fechar o app
        function verificarCorridaAtivaAoLogar() {
            db.ref('corridas_pendentes').once('value', snap => {
                snap.forEach(c => {
                    const dados = c.val();
                    if(dados.passageiroId === currentUser.id && dados.status !== "Finalizada") {
                        idCorridaAtual = c.key;
                        document.getElementById('painel-pedido').style.display = "none";
                        document.getElementById('status-monitor').style.display = "block";
                        monitorarCorrida();
                    }
                });
            });
        }

        function monitorarCorrida() {
            db.ref('corridas_pendentes/' + idCorridaAtual).on('value', snap => {
                const c = snap.val();
                if(!c) return;

                const msg = document.getElementById('status-msg');
                const box = document.getElementById('info-motorista-box');
                const btnCancel = document.getElementById('btn-cancelar-corrida');

                if(c.status === "A caminho") {
                    msg.innerText = "🚕 MOTORISTA A CAMINHO!";
                    msg.style.color = "#2ecc71";
                    box.style.display = "block";
                    btnCancel.style.display = "none"; // Esconde cancelar quando motorista aceita
                    document.getElementById('txt-nome-mot').innerText = c.motoristaNome;
                    document.getElementById('txt-veiculo-mot').innerText = c.motoristaModelo || "Veículo cadastrado";
                    document.getElementById('txt-placa-mot').innerText = c.motoristaPlaca;
                } 
                else if(c.status === "Em Viagem") {
                    msg.innerText = "🏁 VOCÊ ESTÁ EM VIAGEM";
                    msg.style.color = "black";
                    btnCancel.style.display = "none";
                }
                else if(c.status === "Finalizada") {
                    alert("Viagem concluída!");
                    location.reload();
                }
            });
        }

        function cancelarCorrida() {
            if(confirm("Deseja cancelar sua solicitação?")) {
                db.ref('corridas_pendentes/' + idCorridaAtual).remove()
                .then(() => {
                    alert("Corrida cancelada.");
                    location.reload();
                });
            }
        }
    </script>
</body>
</html>
