<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINDAVAI - Passageiro V7.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <style>
        :root { --pindavai: #ffcc00; --dark: #1a1a1a; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; }
        
        #map { height: 50vh; width: 100%; }
        
        .container { padding: 20px; position: relative; top: -20px; background: white; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        
        .input-group { background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .input-group input { border: none; background: transparent; width: 100%; outline: none; font-size: 16px; }
        
        .price-box { background: var(--dark); color: white; padding: 15px; border-radius: 12px; text-align: center; margin: 15px 0; }
        .price-box span { font-size: 24px; font-weight: bold; color: var(--pindavai); }
        
        .btn-confirm { background: var(--pindavai); color: black; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
        
        /* Estilo da rota no mapa */
        .leaflet-routing-container { display: none; } /* Esconde o painel de texto do roteamento */
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="container">
        <div class="input-group">
            <i class="fas fa-circle" style="color: #28a745;"></i>
            <input type="text" id="origem" placeholder="Sua localização..." readonly>
        </div>
        <div class="input-group">
            <i class="fas fa-location-dot" style="color: #ff4444;"></i>
            <input type="text" id="destino" placeholder="Para onde vamos?">
        </div>

        <div class="price-box">
            Valor Estimado: <br>
            <span id="valor-exibido">R$ 0,00</span>
        </div>

        <button class="btn-confirm" onclick="confirmarViagem()">CONFIRMAR VIAGEM</button>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = { databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, userMarker, routingControl;
        let distanciaFinal = 0, tempoFinal = 0, valorFinal = 0;

        function initMap() {
            map = L.map('map').setView([-22.9255, -45.4548], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // Capturar localização real
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const { latitude, longitude } = pos.coords;
                    map.setView([latitude, longitude], 15);
                    userMarker = L.marker([latitude, longitude]).addTo(map).bindPopup("Você está aqui").openPopup();
                    document.getElementById('origem').value = "Minha Localização Atual";
                });
            }
        }

        // FUNÇÃO DE CÁLCULO DINÂMICO (Conectada à Central Master)
        async function calcularPreco(distanciaKM, tempoMinutos) {
            const snapshot = await db.ref('configuracoes/tarifas').once('value');
            const t = snapshot.val();

            if (!t) return 0;

            let valorKMUsado = parseFloat(t.km); // Valor padrão cidade

            // Lógica de Faixas que você pediu:
            if (distanciaKM > 100 && distanciaKM <= 500) {
                valorKMUsado = parseFloat(t.km_100_a_500);
            } else if (distanciaKM > 50 && distanciaKM <= 100) {
                valorKMUsado = parseFloat(t.km_50_a_100);
            } else if (distanciaKM > 15 && distanciaKM <= 50) {
                valorKMUsado = parseFloat(t.km_ate_50);
            }

            const base = parseFloat(t.base);
            const precoMinuto = tempoMinutos * parseFloat(t.minuto);
            const precoDistancia = distanciaKM * valorKMUsado;

            const total = base + precoDistancia + precoMinuto;
            return total;
        }

        // SIMULAÇÃO DE ROTA (Ao digitar destino)
        document.getElementById('destino').addEventListener('change', function() {
            // Aqui você integraria com uma API de busca (Nominatim ou Google)
            // Para este exemplo, vamos simular que ao digitar algo, ele traça uma rota de 12km
            alert("Buscando rota...");
            executarRoteamento([-22.9255, -45.4548], [-22.9300, -45.5000]); // Coordenadas exemplo
        });

        function executarRoteamento(start, end) {
            if (routingControl) map.removeControl(routingControl);

            routingControl = L.Routing.control({
                waypoints: [L.latLng(start), L.latLng(end)],
                routeWhileDragging: false,
                lineOptions: { styles: [{ color: '#ffcc00', weight: 5 }] }
            }).on('routesfound', async function(e) {
                const routes = e.routes[0];
                distanciaFinal = routes.summary.totalDistance / 1000; // KM
                tempoFinal = routes.summary.totalTime / 60; // Minutos

                valorFinal = await calcularPreco(distanciaFinal, tempoFinal);
                document.getElementById('valor-exibido').innerText = `R$ ${valorFinal.toFixed(2)}`;
            }).addTo(map);
        }

        function confirmarViagem() {
            if (valorFinal <= 0) {
                alert("Selecione um destino primeiro!");
                return;
            }

            const novaCorrida = {
                passageiro_nome: "Usuário Teste", // Aqui viria do login
                valor: valorFinal.toFixed(2),
                distancia: distanciaFinal.toFixed(2),
                status: "procurando",
                timestamp: Date.now()
            };

            db.ref('corridas').push(novaCorrida).then(() => {
                alert("Procurando motoristas próximos...");
            });
        }

        window.onload = initMap;
    </script>
</body>
</html>
