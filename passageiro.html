<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PINDAVAI - Passageiro Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --pindavai: #ffcc00; --dark: #1a1a1a; }
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; height: 100%; background: #f4f4f4; }
        .screen { display: none; min-height: 100vh; flex-direction: column; }
        .active { display: flex; }
        
        /* Estilos de Autenticação */
        .auth-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* Inputs e Botões */
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .btn-main { background: var(--pindavai); color: #000; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        
        /* Painel de Corrida */
        #map { flex: 1; width: 100%; min-height: 250px; }
        .ride-panel { background: white; padding: 20px; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); margin-top: -30px; z-index: 1000; }
        .stop-row { display: flex; align-items: center; gap: 5px; }
        .btn-add-stop { background: #eee; border: none; padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; margin-bottom: 10px; }
        .price-tag { background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 10px; text-align: center; font-size: 20px; font-weight: bold; margin: 10px 0; display: none; }
    </style>
</head>
<body>

    <div id="screen-login" class="screen active">
        <div class="auth-container">
            <div class="auth-card">
                <h1>PINDAVAÍ</h1>
                <input type="email" id="login-email" placeholder="E-mail">
                <input type="password" id="login-senha" placeholder="Senha">
                <button class="btn-main" onclick="acaoLogin()">ENTRAR</button>
                <p onclick="navegar('screen-cadastro')" style="cursor:pointer; color:blue; margin-top:20px;">Criar Conta</p>
            </div>
        </div>
    </div>

    <div id="screen-cadastro" class="screen">
        <div class="auth-container">
            <div class="auth-card">
                <h3>Cadastro</h3>
                <input type="text" id="cad-nome" placeholder="Nome Completo">
                <input type="text" id="cad-cpf" placeholder="CPF">
                <input type="email" id="cad-email" placeholder="E-mail">
                <input type="password" id="cad-senha" placeholder="Senha">
                <button class="btn-main" onclick="acaoCadastro()">FINALIZAR</button>
                <p onclick="navegar('screen-login')" style="cursor:pointer; margin-top:15px;">Voltar</p>
            </div>
        </div>
    </div>

    <div id="screen-app" class="screen">
        <div id="map"></div>
        <div class="ride-panel">
            <div id="user-welcome" style="font-weight: bold; margin-bottom: 10px;"></div>
            
            <input type="text" id="inp-partida" placeholder="📍 Local de partida">
            
            <div id="container-paradas">
                </div>
            <button class="btn-add-stop" onclick="adicionarParada()">+ Adicionar Parada</button>
            
            <input type="text" id="inp-destino" placeholder="🏁 Destino Final" onchange="calcularValor()">

            <select id="select-pagamento" onchange="calcularValor()">
                <option value="">Forma de Pagamento</option>
                <option value="Dinheiro">Dinheiro</option>
                <option value="Cartão (Maquininha)">Cartão (Maquininha)</option>
                <option value="Pix">Pix</option>
            </select>

            <div id="display-preco" class="price-tag">R$ 0,00</div>

            <button class="btn-main" id="btn-chamar" onclick="solicitarCorrida()">CHAMAR PINDAVAÍ</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCjP9yWZK4AUkJmswfb5iZVTlENDfTmP8o",
            authDomain: "meuappmobilidade-a6f93.firebaseapp.com",
            projectId: "meuappmobilidade-a6f93",
            databaseURL: "https://meuappmobilidade-a6f93-default-rtdb.firebaseio.com/",
            storageBucket: "meuappmobilidade-a6f93.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let paradasContador = 0;

        function navegar(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function adicionarParada() {
            paradasContador++;
            const container = document.getElementById('container-paradas');
            const div = document.createElement('div');
            div.className = 'stop-row';
            div.id = 'stop-' + paradasContador;
            div.innerHTML = `
                <input type="text" placeholder="🛑 Parada ${paradasContador}" class="inp-parada">
                <button onclick="removerParada(${paradasContador})" style="border:none; background:none; color:red;">X</button>
            `;
            container.appendChild(div);
        }

        function removerParada(id) {
            document.getElementById('stop-' + id).remove();
            calcularValor();
        }

        function calcularValor() {
            const partida = document.getElementById('inp-partida').value;
            const destino = document.getElementById('inp-destino').value;
            const pagamento = document.getElementById('select-pagamento').value;

            if(partida && destino && pagamento) {
                // Lógica de Preço Fake para teste (R$ 5 base + R$ 10 fixo)
                // No futuro, aqui entrará o cálculo por KM real
                let valorBase = 5.00;
                let valorKM = 12.00; 
                let adicionalParada = document.querySelectorAll('.inp-parada').length * 2.00;
                
                let total = valorBase + valorKM + adicionalParada;
                
                const display = document.getElementById('display-preco');
                display.innerText = "Valor Estimado: R$ " + total.toFixed(2);
                display.style.display = "block";
            }
        }

        async function acaoCadastro() {
            const nome = document.getElementById('cad-nome').value;
            const cpf = document.getElementById('cad-cpf').value;
            const email = document.getElementById('cad-email').value;
            const senha = document.getElementById('cad-senha').value;
            
            if(!nome || !cpf || !email) return alert("Preencha tudo!");

            await db.ref('passageiros').push({ nome, cpf, email, senha, status: "ativo" });
            alert("Cadastrado!");
            navegar('screen-login');
        }

        function acaoLogin() {
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;

            db.ref('passageiros').orderByChild('email').equalTo(email).once('value', snap => {
                if(snap.exists()){
                    const user = Object.values(snap.val())[0];
                    if(user.senha === senha) {
                        localStorage.setItem('pindavai_user', JSON.stringify(user));
                        document.getElementById('user-welcome').innerText = "Olá, " + user.nome;
                        navegar('screen-app');
                        initMap();
                    } else alert("Senha errada");
                } else alert("Não encontrado");
            });
        }

        function initMap() {
            const map = L.map('map').setView([-22.9255, -45.4548], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        function solicitarCorrida() {
            const user = JSON.parse(localStorage.getItem('pindavai_user'));
            const partida = document.getElementById('inp-partida').value;
            const destino = document.getElementById('inp-destino').value;
            const pagamento = document.getElementById('select-pagamento').value;
            const preco = document.getElementById('display-preco').innerText;

            if(!partida || !destino || !pagamento) return alert("Preencha todos os dados da corrida!");

            const corrida = {
                passageiroNome: user.nome,
                passageiroTel: user.telefone || "Não informado",
                partida: partida,
                destino: destino,
                pagamento: pagamento,
                valor: preco,
                status: "pendente",
                data: new Date().toISOString()
            };

            db.ref('corridas_pendentes').push(corrida).then(() => {
                alert("🚗 Buscando motorista próximo...");
            });
        }
    </script>
</body>
</html>
